\* P9-SLATE-1 buggy: enable Decrement action.
\*
\* Decrement reduces version by 1. This models a programmer error
\* like resetting the counter on /event-clear or mis-ordering a
\* snapshot. VersionMonotonic must fire as a temporal property
\* counterexample.
\*
\* Expected verdict: TLC reports a counterexample on VersionMonotonic
\* almost immediately (Dispatch once → version=2; Decrement → version=1).
SPECIFICATION Spec

CONSTANTS
    EventVals               = {e1}
    MaxEvents               = 2
    BuggyReorder            = FALSE
    BuggyVersionDecrement   = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants

PROPERTIES
    VersionMonotonic
