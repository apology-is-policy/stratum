\* Buggy variant — Unlink decrements nlink to 0 but leaves
\* ALLOCATED state (no cascade-free).
\*
\* Real-world failure mode: a buggy unlink path drops the dirent
\* and decrements nlink to 0 but forgets to flip the inode to
\* FREED. The (ALLOCATED, nlink=0) state is the very orphan that
\* R71 P1-1 caught at the writer-side guard for stm_inode_set —
\* a record committed in this state would wedge the pool on next
\* mount via the FREED ⇔ nlink decoder check (R70 P3-3). At the
\* spec level the same bug fires the runtime invariant
\* LinkedAllocatedHasPositiveNlink as soon as Unlink is applied
\* to an ino with nlink=1.
\*
\* Expected verdict: TLC fires LinkedAllocatedHasPositiveNlink.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1, i2}
    MaxGen                       = 2
    MaxNlink                     = 2
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = TRUE
    EnableInlineDataModel        = FALSE
    MaxFileLen                   = 0
    MaxInline                    = 0
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
