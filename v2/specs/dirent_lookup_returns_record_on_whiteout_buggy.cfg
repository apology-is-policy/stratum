\* P8-POSIX-9b: lookup returns whiteout's zero-ino tuple as a live
\* record (instead of NONE for "name hidden by whiteout"). Fires
\* LookupAgreesWithLinks — the abstract `links` oracle says the
\* whiteout's name is not currently linked (the Whiteout action
\* removed the (name, ino, gen) tuple); the buggy lookup returns
\* <<"_", 0>>; <<"_", 0>> # NONE so LookupAgreesWithLinks fails.
\*
\* Trace shape: Create(d1, n_a, ino_1, 0) ; Whiteout(d1, n_a) ;
\* LookupAgreesWithLinks evaluated on n_a returns <<"_", 0>>
\* whereas the oracle says NONE.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = TRUE
    BuggyWhiteoutDropsName              = FALSE
    BuggyLookupReturnsRecordOnWhiteout  = TRUE

INVARIANTS
    Invariants
