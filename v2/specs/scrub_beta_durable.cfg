\* β + γ combined model check (R26 P3-2):
\* CallbackSet=TRUE, WithCrash=TRUE.
\*
\* Exercises the cross-product of β cb-mode classification and γ
\* durable-cursor crash-recovery. Universe:
\*   NumBlocks        = 3
\*   CorruptBlocks    = {2, 3}
\*   RepairableBlocks = {2}        \* β: block 2 repairable, 3 not
\*   CallbackSet      = TRUE
\*   WithCrash        = TRUE
\*
\* Trace covered (one of many TLC explores):
\*   Init → Start → Persist → StepClean(1) → StepRepaired(2) →
\*   Persist → Crash → Mount  ⇒  in-RAM restored to (RUNNING,
\*   cursor=2, verified=1, repaired=1).  Continue: StepUnrepairable(3) →
\*   Persist → Complete → Persist.
\*
\* Expect: all invariants hold including:
\*   ProcessedCount: verified + failed + repaired + unrepairable = cursor
\*   CallbackSetExclusivity: failed = 0 throughout (β-mode)
\*   CrashedMeansInRamFresh: while crashed, in-RAM is reset
\*   DurableProcessedCount + DurableCallbackSetExclusivity
\*
\* Closes the spec coverage gap from the original scrub_durable.cfg
\* which only modeled α + crash; β + crash was unmodeled until now
\* (R26 P3-2). The spec confirms that β-mode survives crash + mount
\* with no exclusivity tear AT THE SPEC LEVEL — the C-level R26 P1-1
\* gap (cb is in-RAM only, lost across mount) is closed by the
\* refined `stm_scrub_set_verify_cb` guard that allows cb
\* reinstallation in RUNNING/PAUSED for the β-resume case.

CONSTANTS
    NumBlocks        = 3
    CorruptBlocks    = {2, 3}
    RepairableBlocks = {2}
    CallbackSet      = TRUE
    BuggyResume      = FALSE
    WithCrash        = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    StateMachineValid
    CursorBounded
    ProcessedCount
    CallbackSetExclusivity
    CompletedIffDrained
    IdleMeansZero
    PauseResumeIdempotent
    SnapshotPinnedWhilePaused
    NoWorkWhenIdleOrCompleted
    DurableProcessedCount
    CrashedMeansInRamFresh
    DurableCallbackSetExclusivity
