\* P8-POSIX-7d buggy variant: Conflicts() returns TRUE even when
\* the two candidates share an owner. Healthy spec admits same-owner
\* overlapping Acquires (lock stacking / upgrade). Under the bug,
\* same-owner overlapping Acquire is REJECTED — but this doesn't
\* fire NoConflictingLocks (the rejected Acquire doesn't add the
\* second lock; the existing locks remain conflict-free).
\*
\* This cfg is GREEN by-design at the locks.tla state-machine level
\* but pins the runtime behavior change: the C impl's
\* `stm_fs_lock`'s same-owner upgrade path observably differs.
\* Forward-noted: a future iteration of the spec could add a
\* `SameOwnerCanStack` invariant that fires under this bug, but
\* the current state-machine doesn't model upgrade-as-an-action.
\* Runtime tests pin the behavior directly via test_locks.c's
\* `locks_same_owner_overlapping_admitted` test.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                       = {i1, i2}
    Owners                     = {o1, o2}
    MaxOff                     = 4
    BuggyOwnerCheckMissing     = TRUE
    BuggyShared_Excl_Granted   = FALSE

INVARIANTS
    Invariants
