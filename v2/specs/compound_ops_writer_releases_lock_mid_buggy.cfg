\* P9.5-PARALLEL-2 buggy config: writer releases fs->lock mid-compound-op.
\*
\* Same bounds as the main cfg but BuggyReleaseLockMid = TRUE enables the
\* WriterReleasesLockMid action. Reachable scenario:
\*
\*   State 0: fs_lock_holder=NONE, in_flight_op=[w1|->0, w2|->0]
\*   AcceptStart(w1) →
\*   State 1: fs_lock_holder=w1, in_flight_op=[w1|->1, w2|->0]
\*   CompoundOpStep(w1, a, +1) →
\*   State 2: fs_lock_holder=w1, in_flight_op=[w1|->2], counter[a]=6
\*   WriterReleasesLockMid(w1) →                          ← THE BUG
\*   State 3: fs_lock_holder=NONE, in_flight_op=[w1|->2]  ← w1 still in op
\*   CompoundOpStart(w2) →
\*   State 4: fs_lock_holder=w2, in_flight_op=[w1|->2, w2|->1]
\*       NOW: InFlight(w1) AND InFlight(w2) — two writers in compound op
\*       → WriterCompoundOpAtomicVsWriter FIRES.
\*
\* Expected verdict: TLC fires WriterCompoundOpAtomicVsWriter within
\* ~5 states (the shortest path above takes 4 transitions). Trace shows
\* the offending interleaving.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    MaxOps                      = 2
    MaxStepsPerOp               = 2
    MaxReadsPerReader           = 2
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyReleaseLockMid         = TRUE
    BuggyNegativeCounter        = FALSE

INVARIANTS
    AllInvariants
