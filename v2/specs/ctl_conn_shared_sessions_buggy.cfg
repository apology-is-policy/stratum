\* P9.5-PARALLEL-1 buggy variant: shared sessions[] keyed by fid alone.
\*
\* Models the pre-PARALLEL-1 stm_ctl: one sessions[] array shared across
\* all connections, slot lookup is "first active slot with matching fid"
\* regardless of which conn owns it. Two concurrent connections both
\* open fid=f1 → both register in the shared pool. ReadFid(c1, f1) may
\* return the slot owned by c2; ClunkShared(c2, f1) may wipe the slot
\* owned by c1.
\*
\* Enables BuggySharedSessions = TRUE so:
\*   - OpenFid mirrors into sharedSessions tagged with owner=c.
\*   - ReadFidShared scans sharedSessions and records lastReadOwner[c]
\*     to the first match's owner — possibly a sibling conn.
\*   - ClunkShared removes the matched entry from sharedSessions AND
\*     wipes the matching entry from sessions[owner] (where owner can
\*     be a sibling conn).
\*
\* Expected verdict: TLC fires NoReadAliasing AND/OR NoClunkSpillover
\* within tens of states. A demonstrable trace:
\*   1. AcceptConn(c1, 1)  → caller[c1]=1
\*   2. AcceptConn(c2, 0)  → caller[c2]=0
\*   3. OpenFid(c2, f1, q_admin) → sessions[c2]={<f1,q_admin>}; shared+={<f1,q_admin,c2>}
\*   4. OpenFid(c1, f1, q_state) → sessions[c1]={<f1,q_state>}; shared+={<f1,q_state,c1>}
\*   5. ReadFidShared(c1, f1) — picks <f1,q_admin,c2> from shared
\*      → lastReadOwner[c1] = c2 ≠ c1 → NoReadAliasing fires.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Conns                   = {c1, c2}
    Fids                    = {f1}
    Qids                    = {q_state, q_admin}
    Uids                    = {0, 1, 2}
    AdminUid                = 2
    NoCaller                = NoCaller
    NoOwner                 = NoOwner
    MaxOpens                = 1
    BuggySharedSessions     = TRUE
    BuggySharedCaller       = FALSE
    BuggyDestroyUAF         = FALSE

INVARIANTS
    AllInvariants
