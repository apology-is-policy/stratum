SPECIFICATION Spec
INVARIANT Invariants
CONSTANTS
    \* P7-16 buggy variant: Reflink mutates origin to (dst_ds, dst_ino,
    \* dst_off) instead of inheriting from src. Two extents end up with
    \* the same `replicas` but different `origin_*` fields, violating
    \* SharedReplicasAreCohabit. Models a C-impl bug where the reflink
    \* path stamps origin = current rather than copying from src.
    \* Bounds match the small-state extent_keyids.cfg shape: enough to
    \* exercise reflink (2 inos, 2 datasets) without state explosion.
    MaxDatasets = 2
    MaxInos = 2
    MaxFileBlocks = 2
    MaxPaddrs = 4
    MaxTxg = 1
    MaxReplicasPerExtent = 2
    MaxKeyIds = 1
    DisableReflink = FALSE
    BuggyWriteAllowsOverlap = FALSE
    BuggyZeroLength = FALSE
    BuggyOverwriteForgetsDrop = FALSE
    BuggyReplicaPaddrCollision = FALSE
    BuggyReflinkRotatesOrigin = TRUE
