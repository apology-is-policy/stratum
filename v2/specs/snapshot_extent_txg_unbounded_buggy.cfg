\* Buggy demo — SnapshotCreate stamps an arbitrary extent_txg instead of
\* capturing sync_gen at create time. Expected: ExtentTxgBoundedBySync
\* violated (a snap's captured extent_txg may exceed sync_gen, modeling
\* the impl bug where send filtered by `created_txg` — a value drawn
\* from a counter that does not bound `extent.gen`).
\*
\* Reachable trace: Init (sync_gen=0). SnapshotCreate under
\* BuggyExtentTxgUnbounded=TRUE picks an arbitrary etxg \in 0..MaxTxg,
\* including any value > 0 = sync_gen. ExtentTxgBoundedBySync (which
\* asserts snap_extent_txg[s] <= sync_gen) fires immediately.
SPECIFICATION Spec

CONSTANTS
    MaxSnaps = 2
    MaxTxg = 3
    TreeRoots = {"r0", "r1"}
    BuggyDeleteWithHold = FALSE
    BuggyChainOutOfOrder = FALSE
    BuggyExtentTxgUnbounded = TRUE

INVARIANTS
    ExtentTxgBoundedBySync
