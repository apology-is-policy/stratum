\* P8-POSIX-7a-anon — healthy orphan-model run.
\*
\* Two inos, MaxGen=2, MaxNlink=1 — small enough to keep state space
\* tractable while exercising every transition involving the orphan
\* state:
\*
\*   AllocAnon → Materialize → (Link allowed, but MaxNlink=1 caps it)
\*               → Unlink → cascade-free
\*   AllocAnon → FreeAnon
\*   AllocFresh / AllocReused (regular path) interleaved
\*
\* EnableInlineDataModel = FALSE keeps the data state space collapsed;
\* the orphan-model invariants are orthogonal to inline data and don't
\* need that surface for coverage. The composite cfg with both flags
\* TRUE would be a larger run; deferred since the two surfaces don't
\* interact (orphan only adds ever_linked / nlink transitions).
\*
\* Expected verdict: TLC explores AllocFresh / AllocReused / AllocAnon /
\* Materialize / Link / Unlink / FreeAnon interleavings on the two
\* inos with no invariant violations. OrphanHasZeroNlink holds because
\* AllocAnon legitimately starts at nlink=0 + ever_linked=FALSE; only
\* Materialize / regular Alloc paths flip ever_linked=TRUE and they all
\* simultaneously bump nlink to ≥ 1.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1, i2}
    MaxGen                       = 2
    MaxNlink                     = 1
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = FALSE
    MaxFileLen                   = 0
    MaxInline                    = 0
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE
    EnableOrphanModel            = TRUE
    BuggyAllocAnonClaimsLinked   = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
