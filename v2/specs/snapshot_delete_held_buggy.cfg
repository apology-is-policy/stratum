\* Buggy demo — SnapshotDelete proceeds even with snap_held[s] = TRUE.
\* Expected: HoldPreventsDelete violated. The reachable trace is:
\*   SnapshotCreate (snap 1 PRESENT, held=FALSE).
\*   SnapshotHold(1) (held=TRUE, PRESENT).
\*   SnapshotDelete(1) under BuggyDeleteWithHold=TRUE → state=ABSENT,
\*   held=TRUE simultaneously. HoldPreventsDelete (snap_held => Present)
\*   fires.
SPECIFICATION Spec

CONSTANTS
    MaxSnaps = 2
    MaxTxg = 4
    TreeRoots = {"r0", "r1"}
    BuggyDeleteWithHold = TRUE
    BuggyChainOutOfOrder = FALSE

INVARIANTS
    HoldPreventsDelete
