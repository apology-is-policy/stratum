\* Healthy fixed config — canonical green run for xattr chain integrity.
\*
\* Mirrors dirent.cfg's bounds: one ino, three names, two values,
\* MaxProbe=3, Hash colliding n_a + n_b at slot 0; n_c at slot 1.
\* The collision exercises the open-addressing chain.
\*
\* Expected verdict: TLC explores all interleavings of Set + Remove
\* across the three names with no invariant violations.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                                = {i1}
    Names                               = {"n_a", "n_b", "n_c"}
    Values                              = {v1, v2}
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE

INVARIANTS
    Invariants
