\* Buggy demo — SetProperty/ClearProperty allow mutating an
\* ImmutableProperty post-Create. Expected: ImmutableEncryption
\* violated. Reachable: CreateChild(root, [encryption -> "v1"]);
\* SetProperty(child, "encryption", "v2") under BuggyMutateEncryption
\* fires; immutable_was_mutated flips TRUE; invariant fires.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 2
    Properties = {"compress", "quota", "encryption"}
    InheritableProperties = {"compress"}
    ImmutableProperties = {"encryption"}
    PropertyValues = {"v1", "v2"}
    PoolDefault <- PoolDefault_All_v1
    BuggyInheritNonInheritable = FALSE
    BuggyMutateEncryption = TRUE

INVARIANTS
    ImmutableEncryption
