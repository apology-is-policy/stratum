\* P9.5-PARALLEL-1 buggy variant: shared caller_uid clobbered per AcceptConn.
\*
\* Models the pre-PARALLEL-1 stm_ctl: one caller_uid scalar overwritten
\* on every accept. The admin gate reads the scalar (sharedCaller) instead
\* of the per-conn caller[c]. When two AcceptConns interleave, the second
\* clobbers the first; an AdminProbe(c1) reads sharedCaller (= c2's uid)
\* and applies the wrong admin verdict.
\*
\* Enables BuggySharedCaller = TRUE so:
\*   - AcceptConn ALSO writes sharedCaller = u (in addition to caller[c]).
\*   - AdminProbeShared(c) reads sharedCaller and records the verdict
\*     into lastAdminVerdict[c].
\*
\* Expected verdict: TLC fires CallerScopedPerConn OR AdminGateMonotonic
\* within ~15 states. Demonstrable trace:
\*   1. AcceptConn(c1, 1) → caller[c1]=1; sharedCaller=1
\*   2. AcceptConn(c2, 2) → caller[c2]=2; sharedCaller=2 (AdminUid)
\*   3. AdminProbeShared(c1) reads sharedCaller=2 → lastAdminVerdict[c1] = IsAdmin(2) = TRUE
\*      But caller[c1]=1 (non-admin) → CallerScopedPerConn fails:
\*      lastAdminVerdict[c1] = TRUE ≠ IsAdmin(caller[c1]) = IsAdmin(1) = FALSE.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Conns                   = {c1, c2}
    Fids                    = {f1}
    Qids                    = {q_state, q_admin}
    Uids                    = {0, 1, 2}
    AdminUid                = 2
    NoCaller                = NoCaller
    NoOwner                 = NoOwner
    MaxOpens                = 1
    BuggySharedSessions     = FALSE
    BuggySharedCaller       = TRUE
    BuggyDestroyUAF         = FALSE

INVARIANTS
    AllInvariants
