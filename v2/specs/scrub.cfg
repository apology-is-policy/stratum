\* Fixed-impl model check: BuggyResume = FALSE.
\*
\* Small but representative universe:
\*   NumBlocks = 3, CorruptBlocks = {2}.
\* Exercises one clean block, one corrupt block, one clean block,
\* then Complete + optional Restart / Reset loop. State space
\* bounded by the cursor / counter combinations plus the 4 states.
\*
\* Expect: all invariants hold. Reachable states small (< 100).

CONSTANTS
    NumBlocks        = 3
    CorruptBlocks    = {2}
    BuggyResume      = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    StateMachineValid
    CursorBounded
    ProcessedCount
    CompletedIffDrained
    IdleMeansZero
    PauseResumeIdempotent
    SnapshotPinnedWhilePaused
    NoWorkWhenIdleOrCompleted
