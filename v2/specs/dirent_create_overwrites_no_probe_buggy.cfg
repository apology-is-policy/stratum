\* Buggy config — Create writes blindly at slot Hash[name], skipping
\* the probe loop and overwriting any colliding occupant.
\*
\* Repro: Create(n_a) → slot 0 = (n_a, ino_1). Create(n_b) under the
\* bug writes at Hash[n_b] = 0, overwriting (n_a) with (n_b, ino_2)
\* at slot 0. The abstract `links` oracle has both (n_a, ...) and
\* (n_b, ...), but slots holds only (n_b). Lookup(n_a) walks the
\* chain from slot 0: finds a record but with name = n_b → continues;
\* slot 1 EMPTY → terminates NotFound.
\*
\* Expected verdict: SlotsAgreeWithLinks fires (the n_a tuple is in
\* links but no slot record). LookupAgreesWithLinks also fires.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = TRUE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = FALSE
    BuggyWhiteoutDropsName              = FALSE
    BuggyLookupReturnsRecordOnWhiteout  = FALSE

INVARIANTS
    Invariants
