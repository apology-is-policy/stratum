\* Buggy variant — Detach(c) does not clear bindings[c]. A re-attach
\* of the same connection ID inherits stale bindings; a lookup on
\* the freshly-detached connection (allowed in the spec because
\* attached is the only gate; the implementation must additionally
\* refuse ops on detached fids — that's a 9P-server-level concern,
\* not a namespace-state concern) sees stale state.
\*
\* Real-world failure mode: Tclunk on the connection's root fid
\* doesn't drop the per-connection mount-table allocation, leaving
\* it eligible for accidental reuse if connection IDs are recycled.
\*
\* Expected verdict: TLC fires DetachClears — bindings[c] still
\* contains a Bind even after Detach(c).
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1, c2}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = FALSE
    BuggyDetachLeaks              = TRUE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = FALSE
    EnableMultiBind               = FALSE
    BuggyMultiBindNoRollback      = FALSE
    BuggyMultiBindTruncateOnly    = FALSE

INVARIANTS
    Invariants
