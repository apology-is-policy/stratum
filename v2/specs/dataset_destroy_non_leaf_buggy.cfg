\* Buggy demo — Destroy accepts a dataset with PRESENT children. The
\* children's parent_id then references an ABSENT dataset; their parent
\* chain to root is broken. Expected: ForestStructure violated.
\*
\* Reachable trace: Create(1,"n1") (id=2). Create(2,"n2") (id=3, child
\* of 2). Destroy(2) under BuggyDestroyNonLeaf — state[2]=ABSENT but
\* state[3]=PRESENT with parent[3]=2; ForestStructure walks 3 → 2
\* (ABSENT) and the ancestor check fails to reach RootId.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 3
    Names = {"n1", "n2"}
    MaxTxg = 4
    BuggyAllowCycles = FALSE
    BuggyAllowDuplicateName = FALSE
    BuggyDestroyNonLeaf = TRUE

INVARIANTS
    ForestStructure
