\* Buggy demo — cb skips csum check on read; accepts CORRUPT bytes as
\* "source". Expected: NoSilentCorruption fires when the cb picks the
\* CORRUPT replica as source (read_outcome[picked] = CSUM_FAIL ≠ OK).
\*
\* Scenario: replica 1 is CORRUPT, replica 2 is OK. Buggy ScanRead(1)
\* sets picked=1 because BuggyAcceptCorrupt is TRUE. Invariant fires
\* immediately at the first ScanRead before scan even completes.
SPECIFICATION Spec

CONSTANTS
    NReplicas = 2
    InitialReplicaStates <- ReplicaStates_CORRUPT_OK
    RewriteCanFail = FALSE
    BuggyAcceptCorrupt = TRUE
    BuggyNoVerifyWriteback = FALSE

INVARIANTS
    NoSilentCorruption
