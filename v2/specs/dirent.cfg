\* Healthy fixed config — the canonical green run.
\*
\* One directory, three names, two child inodes, gen ∈ {0, 1}, three
\* slot probe positions. Hash collides n_a + n_b at slot 0; n_c sits
\* alone at slot 1. The collision is what exercises the open-
\* addressing chain — without it, every name resolves at probe 0 and
\* the buggy variants don't reproduce. With it, an UnlinkUsesEmpty
\* on n_a leaves slot 0 EMPTY, breaking Lookup of n_b at slot 1.
\*
\* Expected verdict: TLC explores all interleavings of Create + Unlink
\* across the three names with no invariant violations. Both
\* LookupAgreesWithLinks and SlotsAgreeWithLinks hold by construction
\* of the healthy actions.
SPECIFICATION Spec

CONSTANTS
    Dirs                            = {d1}
    Names                           = {"n_a", "n_b", "n_c"}
    Inos                            = {ino_1, ino_2}
    MaxGen                          = 1
    MaxProbe                        = 3
    Hash                            <- HashAB_C
    NONE                            = NONE
    BuggyUnlinkUsesEmpty            = FALSE
    BuggyCreateOverwritesNoProbe    = FALSE
    BuggyLookupStopsOnTombstone     = FALSE

INVARIANTS
    Invariants
