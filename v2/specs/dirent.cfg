\* Healthy fixed config — the canonical green run.
\*
\* One directory, three names, two child inodes, gen ∈ {0, 1}, three
\* slot probe positions. Hash collides n_a + n_b at slot 0; n_c sits
\* alone at slot 1. The collision is what exercises the open-
\* addressing chain — without it, every name resolves at probe 0 and
\* the buggy variants don't reproduce. With it, an UnlinkUsesEmpty
\* on n_a leaves slot 0 EMPTY, breaking Lookup of n_b at slot 1.
\*
\* P8-POSIX-4 readdir actions are also enabled (ReaddirReset/Step/End)
\* — the spec covers cursor stability invariants alongside the
\* write-side chain-integrity ones.
\*
\* Expected verdict: TLC explores all interleavings of Create + Unlink
\* + Readdir cycles across the three names with no invariant violations.
\* Both LookupAgreesWithLinks and SlotsAgreeWithLinks hold by
\* construction of the healthy actions; the four readdir invariants
\* (NoTombstoneEmitted / NoDuplicateProbeInLog / CursorMonotonic /
\* CompleteAtEnd) hold by construction of the healthy ReaddirStep.
\*
\* CHECK_DEADLOCK FALSE: terminal states are reachable when all names
\* linked + iter inactive + no remaining unlink target — TLC sees this
\* as deadlock without the override.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = FALSE
    BuggyWhiteoutDropsName              = FALSE
    BuggyLookupReturnsRecordOnWhiteout  = FALSE

INVARIANTS
    Invariants
