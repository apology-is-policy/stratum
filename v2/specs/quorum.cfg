\* Phase 5 P5-0 — multi-device quorum model.
\*
\* Devices    = {1, 2, 3}  — three-device pool; QuorumN = 2.
\*                           Covers N=3 (the smallest non-trivial quorum
\*                           case) and represents the canonical "lose 1,
\*                           survive" redundancy target. N=2 is a trivial
\*                           case where quorum requires both (no failure
\*                           tolerance). N=5 expands state space without
\*                           changing the safety argument — add to a
\*                           larger run later if wanted.
\*
\* MaxCommits = 3           — three consecutive commits; enough to expose
\*                           multi-commit interactions (a successful
\*                           commit followed by a partial one, etc.).
\*
\* MaxFaults  = 2           — up to two concurrent faults; with N=3
\*                           quorum=2, losing 2 devices breaks quorum
\*                           and should abort in-flight commits.
CONSTANTS
    Devices    = {1, 2, 3}
    MaxCommits = 3
    MaxFaults  = 2

SPECIFICATION Spec

INVARIANT Invariants
