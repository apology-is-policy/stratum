\* Phase 5 P5-2 — multi-device quorum + content-agreement model.
\*
\* R14 extension (2026-04-22): content-agreement dimension added. This
\* cfg uses IdempotentRetry=TRUE + MaxFaults=0 to verify the FIXED
\* impl's correctness under the "happy path" (no device faults mid-
\* commit). Retries preserve coord_commit_content, so every WriteFinal
\* at target_gen stamps the same content across devices —
\* ContentQuorumAtGen holds throughout.
\*
\* For the BUGGY-impl demonstration (IdempotentRetry=FALSE), see
\* quorum_buggy.cfg. TLC finds a counterexample where multiple
\* RetryPhase3 firings bump coord_commit_content, causing three
\* WriteFinal firings at the same target_gen to stamp three distinct
\* contents on different devices — no content has quorum coverage.
\*
\* Note on MaxFaults=0: device-fault + crash + remount scenarios can
\* leave an orphan UB on a FAULTED device that conflicts with the
\* mount-claim written to online devices. If the FAULTED device later
\* rejoins, the cross-content-quorum check at mount may fail —
\* recovery requires administrator intervention (a successful
\* commit with all devices online overwrites the orphan). This is
\* outside the commit-protocol correctness and falls under ARCH §5.8
\* device reconciliation (P5-4). Setting MaxFaults=0 here keeps the
\* spec focused on commit protocol correctness; P5-4 will extend the
\* model to cover rejoin + reconcile semantics.
\*
\* Devices    = {1, 2, 3}  — three-device pool; QuorumN = 2.
\* MaxCommits = 2
\* MaxFaults  = 0          — no device faults (P5-4 scope).
\* MaxRetries = 1          — one retry per commit.
CONSTANTS
    Devices         = {1, 2, 3}
    MaxCommits      = 2
    MaxFaults       = 0
    MaxRetries      = 1
    IdempotentRetry = TRUE

SPECIFICATION Spec

INVARIANT Invariants
