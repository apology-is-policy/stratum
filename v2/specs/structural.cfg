SPECIFICATION Spec

\* Three-key instance with Sep in the middle, sweeping an initial set
\* that includes keys on both sides and one absent key. Two readers.
\* Finishes in milliseconds.
CONSTANTS
    Keys          = {1, 2, 3}
    Sep           = 2
    InitialKeys   = {1, 3}
    ReaderThreads = {r0, r1}

INVARIANTS
    Invariants
