SPECIFICATION Spec

\* Five-key instance with Sep2 < Sep1 and an InitialKeys set spanning
\* the three resulting ranges plus a missing key. Two readers.
CONSTANTS
    Keys          = {1, 2, 3, 4, 5}
    Sep1          = 4
    Sep2          = 2
    InitialKeys   = {1, 3, 5}
    ReaderThreads = {r0, r1}

INVARIANTS
    Invariants
