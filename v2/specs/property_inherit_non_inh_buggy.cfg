\* Buggy demo — non-inheritable properties walk the parent chain.
\* Expected: NonInheritableNoWalk violated. Reachable: SetProperty(root,
\* "quota", "v2"); CreateChild(root, ...); now child has no local quota,
\* and "quota" is non-inheritable. Under fixed policy, effective(child,
\* "quota") = PoolDefault["quota"] = "v1". Under BuggyInheritNonInheritable,
\* effective walks to root, finds local "v2", returns "v2" — invariant
\* says "v1" was expected, fires.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 2
    Properties = {"compress", "quota", "encryption"}
    InheritableProperties = {"compress"}
    ImmutableProperties = {"encryption"}
    PropertyValues = {"v1", "v2"}
    PoolDefault <- PoolDefault_All_v1
    BuggyInheritNonInheritable = TRUE
    BuggyMutateEncryption = FALSE

INVARIANTS
    NonInheritableNoWalk
