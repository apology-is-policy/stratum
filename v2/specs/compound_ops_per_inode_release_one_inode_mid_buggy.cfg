\* P9.5-PARALLEL-3 buggy config: writer releases one inode lock mid-op.
\*
\* Same bounds as the main cfg but BuggyReleaseOneInodeMid = TRUE enables
\* the WriterReleasesOneInodeMid action. A writer that has acquired all
\* of its target locks may release ONE while still in-flight. After the
\* release, held[w] ≠ op_targets[w], and the writer cannot do further
\* steps (CompoundOpStep requires AcquisitionComplete) without
\* re-acquiring.
\*
\* The invariant violation chain:
\*
\*   State 0: locks free, no writer in op
\*   CompoundOpStart(w1, {1, 2}) →
\*   State 1: w1 in op, targets={1,2}, held={}
\*   CompoundOpAcquireNext(w1, 1) → CompoundOpAcquireNext(w1, 2) →
\*   State 3: w1 holds {1, 2}, AcquisitionComplete(w1)
\*   CompoundOpStep(w1, a, +1) →
\*   State 4: counter[a] = 6, in_flight_op[w1] = 2
\*   WriterReleasesOneInodeMid(w1, 1) →                    ← THE BUG
\*   State 5: w1 holds {2}, lock_holder[1] = NONE
\*       LockOrderPreserved check: ∀ j ∈ {2}. ∀ i ∈ {1, 2}. (i < j) ⇒ i ∈ held?
\*           j=2, i=1: 1 < 2 ⇒ 1 ∈ {2}? FALSE.
\*       → LockOrderPreserved FIRES.
\*
\* The semantic concern: w1 mutated counter[a] under the assumption of
\* holding both target locks. After the buggy release, another writer
\* w2 could acquire inode 1 and ALSO mutate counter[a] before w1
\* re-acquires. The model abstracts this into a single counter, so
\* the actual concurrent-mutation race surfaces as an interleaving
\* that violates the LockOrderPreserved local invariant — caught
\* immediately rather than as an eventual-state divergence.
\*
\* Expected verdict: TLC fires LockOrderPreserved within ~5 states.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    NumInodes                   = 2
    MaxOps                      = 2
    MaxStepsPerOp               = 1
    MaxReadsPerReader           = 1
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyOutOfOrderAcquire      = FALSE
    BuggyReleaseOneInodeMid     = TRUE

INVARIANTS
    AllInvariants
