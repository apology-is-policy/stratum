\* Buggy variant — AllocFresh accepts already-ALLOCATED inos.
\*
\* Real-world failure mode: a buggy allocator's "fresh ino" path
\* fails to track that an ino is already ALLOCATED and re-issues it
\* to a different caller, producing two distinct files claiming the
\* same ino number simultaneously. This is the second canonical
\* class of allocator bug — silent double-issue without an
\* intervening Free.
\*
\* Expected verdict: TLC fires TupleUniqueAllTime — two history
\* entries for the same ino with the same gen=0 but different event
\* ids (the double AllocFresh).
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1, i2}
    MaxGen                       = 2
    MaxNlink                     = 2
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = TRUE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = FALSE
    MaxFileLen                   = 0
    MaxInline                    = 0
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE
    EnableOrphanModel            = FALSE
    BuggyAllocAnonClaimsLinked   = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
