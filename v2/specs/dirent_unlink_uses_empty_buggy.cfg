\* Buggy config — Unlink leaves an EMPTY slot instead of a TOMBSTONE.
\*
\* Repro: Create(n_a) → slot 0; Create(n_b) collides at slot 0 →
\* probes to slot 1. Unlink(n_a) under the bug clears slot 0 to
\* EMPTY (not TOMBSTONE). Lookup(n_b) walks the chain from slot 0
\* and short-circuits at the empty slot, returning NotFound despite
\* (n_b, ino_2, gen) still being in the abstract `links` oracle.
\*
\* Expected verdict: LookupAgreesWithLinks fires within a few states.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = TRUE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = FALSE
    BuggyWhiteoutDropsName              = FALSE
    BuggyLookupReturnsRecordOnWhiteout  = FALSE

INVARIANTS
    Invariants
