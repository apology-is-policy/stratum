\* Buggy demo — SnapDelete proceeds even when the snap has PRESENT
\* clones. Expected: CloneOriginPresent + SnapWithClonesUndeletable
\* both fire when SnapCreate(1) → CloneCreate(1) → SnapDelete(1)
\* leaves the clone with dataset_origin pointing at the ABSENT snap.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 3
    MaxSnaps = 2
    BuggyDeleteSnapWithClones = TRUE

INVARIANTS
    CloneOriginPresent
