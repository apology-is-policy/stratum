\* P9-9P-0 buggy variant — Walk binds newfid with cached_gen = 0
\* instead of snapshotting current_gen at bind time.
\*
\* Real-world failure mode: the 9P server's Twalk handler fetches
\* the target inode but stamps the resulting fid with a stale gen
\* (e.g., reads from a cached struct that hasn't been refreshed,
\* or copies cached_gen from the source fid instead of the target
\* inode's current gen). Subsequent IO on the new fid is silently
\* ESTALE forever — the file is alive but the fid was born stale.
\* DoS shape, not a corruption shape; still a P1 because the
\* client can never diagnose it.
\*
\* Expected verdict: TLC fires WalkBindsWithCurrentGen via:
\*   ReuseAlloc(i_other)         \* gen 0 → 1, alive
\*   Attach(c1, f1)              \* fids[c1][f1] = <<i_root, 0>>
\*                                  cached=0, current=0 → matches; OK
\*   Walk(c1, f1, f2, i_other)   \* fids[c1][f2] = <<i_other, 0>>
\*                                  audit_walk[c1][f2] = <<i_other, 0, 1>>
\*                                  cached_at_bind=0 /= current_at_bind=1
\* invariant fires immediately on the audit_walk record.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = FALSE
    BuggyWalkSnapshotsStaleGen    = TRUE
    BuggyClunkLeaksFid            = FALSE
    BuggyDetachLeaksFids          = FALSE

INVARIANTS
    Invariants
