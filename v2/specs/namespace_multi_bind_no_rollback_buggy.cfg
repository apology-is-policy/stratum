\* Buggy variant — AbortBatch DOES NOT restore bindings to the
\* pre-batch snapshot. The connection's authored shadow is restored
\* (c "intends" to revert to pre-batch state) but bindings keeps
\* every entry that was applied before the abort.
\*
\* Real-world failure mode: apply_attach_spec's failure path forgets
\* to call the rollback helper; the parser rejects the spec but the
\* impl leaves whatever was applied so far in s->bindings.
\*
\* Expected verdict: TLC fires BindingsMatchAuthored — after a batch
\* is aborted with BuggyMultiBindNoRollback, bindings[c][p] still
\* holds the applied source while authored[c][p] reverted to NONE
\* (or to the pre-batch value). The mismatch surfaces immediately
\* on AbortBatch; no further actions needed.
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank, s_archive}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = FALSE
    BuggyDetachLeaks              = FALSE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = FALSE
    EnableMultiBind               = TRUE
    BuggyMultiBindNoRollback      = TRUE
    BuggyMultiBindTruncateOnly    = FALSE

INVARIANTS
    Invariants
