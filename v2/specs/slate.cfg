\* P9-SLATE-1 + P9-SLATE-2 healthy fixed config.
\*
\* Bounded constants for tractable TLC. No buggy actions enabled.
\* MaxConfigChanges=3 lets us cover a Disconnect-Reattach cycle plus
\* an extra Attach so re-attach with different socket is exercised.
\*
\* Expected verdict: TLC explores all interleavings of WriteEvent /
\* Dispatch / Attach / Disconnect with no invariant violations.
SPECIFICATION Spec

CONSTANTS
    EventVals                = {e1, e2}
    MaxEvents                = 2
    Sockets                  = {s1, s2}
    Panels                   = {L, R}
    MaxConfigChanges         = 3
    BuggyReorder             = FALSE
    BuggyVersionDecrement    = FALSE
    BuggyAttachSplitState    = FALSE
    BuggyDisconnectKeepsPath = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants

PROPERTIES
    VersionMonotonic
    ReadConsistent
    DispatchProgress
