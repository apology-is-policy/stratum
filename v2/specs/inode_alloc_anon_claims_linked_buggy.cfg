\* P8-POSIX-7a-anon buggy variant — AllocAnon misclaims the orphan
\* as already-linked (sets ever_linked = TRUE) while leaving nlink = 0.
\*
\* Real-world failure mode: a buggy stm_fs_create_anon impl forgets
\* to clear the ever_linked flag (e.g., reusing the AllocFresh code
\* path verbatim and only changing nlink to 0). The (ALLOCATED,
\* ever_linked=TRUE, nlink=0) state would let stm_inode_set commit
\* the record, sync_commit persist it, and the next mount's load_at
\* decoder accept it (nlink=0 is the FREED-flagged condition; the
\* writer-side guard added at R71 P1-1 already rejects nlink=0 on
\* ALLOCATED records). At the spec level, the buggy AllocAnon's
\* post-state directly fires LinkedAllocatedHasPositiveNlink:
\* ALLOCATED + ever_linked=TRUE → nlink ≥ 1 fails because nlink=0.
\*
\* Expected verdict: TLC fires LinkedAllocatedHasPositiveNlink at
\* the post-AllocAnon state.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1, i2}
    MaxGen                       = 2
    MaxNlink                     = 1
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = FALSE
    MaxFileLen                   = 0
    MaxInline                    = 0
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE
    EnableOrphanModel            = TRUE
    BuggyAllocAnonClaimsLinked   = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
