\* Fixed config — property inheritance with one inheritable (compress),
\* one non-inheritable (quota), one immutable (encryption). 2 values.
\* MaxDatasets=2 keeps state space tractable.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 2
    Properties = {"compress", "quota", "encryption"}
    InheritableProperties = {"compress"}
    ImmutableProperties = {"encryption"}
    PropertyValues = {"v1", "v2"}
    PoolDefault <- PoolDefault_All_v1
    BuggyInheritNonInheritable = FALSE
    BuggyMutateEncryption = FALSE

INVARIANTS
    TypeOK
    RootInvariant
    LocalOverrideWins
    NonInheritableNoWalk
    InheritFromParent
    ImmutableEncryption
