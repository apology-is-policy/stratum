\* Buggy demo — Move accepts a target parent that is a descendant of the
\* moved dataset. Expected: ForestStructure violated (parent chain no
\* longer reaches root for the cycled subtree).
\*
\* Reachable trace: Create(1,"n1") yields dataset 2 child of 1.
\* Create(2,"n2") yields dataset 3 child of 2. Move(2, 3) under
\* BuggyAllowCycles makes parent[2]=3, parent[3]=2 — a cycle.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 3
    Names = {"n1", "n2"}
    MaxTxg = 4
    BuggyAllowCycles = TRUE
    BuggyAllowDuplicateName = FALSE
    BuggyDestroyNonLeaf = FALSE

INVARIANTS
    ForestStructure
