\* α + γ-mode model check: WithCrash = TRUE, CallbackSet = FALSE.
\*
\* Exercises Persist + Crash + Mount actions on top of the α
\* state machine. Block 2 is corrupt → fires StepCorrupt; this
\* tests that mid-run state survives Crash + Mount via Persist.
\*
\* Trace covered (one of many TLC explores):
\*   Init → Start → Persist → StepClean(1) → Persist → Crash →
\*   Mount  ⇒  cursor = 1 (the last persisted value)
\*   Continue: StepCorrupt(2) → Persist → StepClean(3) →
\*   Complete → Persist
\*
\* Expect: all invariants hold including:
\*   DurableProcessedCount: d_verified+d_failed+d_repaired+
\*       d_unrepairable = d_cursor at every state.
\*   CrashedMeansInRamFresh: while crashed, in-RAM is reset
\*       (state=IDLE, all counters=0). Combined with Mount's
\*       assignment, structurally enforces "post-Mount cursor =
\*       last persisted cursor" — γ's load-bearing safety property.
\*   DurableCallbackSetExclusivity: durable counters split by
\*       mode same as in-RAM.
\*
\* α + γ only. β + γ is in a separate config (`scrub_beta_durable.cfg`)
\* per R26 P3-2.
\*
\* Small bound: 3 blocks × 4 states × Persist/Crash/Mount.
\* TLC reachable state count is moderate (durable shadow
\* multiplies state space by the persist points encountered).

CONSTANTS
    NumBlocks        = 3
    CorruptBlocks    = {2}
    RepairableBlocks = {}
    CallbackSet      = FALSE
    BuggyResume      = FALSE
    WithCrash        = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    StateMachineValid
    CursorBounded
    ProcessedCount
    CallbackSetExclusivity
    CompletedIffDrained
    IdleMeansZero
    PauseResumeIdempotent
    SnapshotPinnedWhilePaused
    NoWorkWhenIdleOrCompleted
    DurableProcessedCount
    CrashedMeansInRamFresh
    DurableCallbackSetExclusivity
