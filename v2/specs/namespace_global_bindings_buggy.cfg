\* Buggy variant — the stratum daemon implements the per-connection
\* mount table as a SINGLE GLOBAL bindings table shared across all
\* connections. Bind by c1 is visible to Lookup(c2, ...).
\*
\* Real-world failure mode: a file-scope `static struct mount_table`
\* in src/9p/, or a singleton-style server-global state. The first
\* class of namespace-isolation bug: zero per-connection state.
\*
\* Expected verdict: TLC fires LookupReflectsOwnBindings — c2 observes
\* a Bind that c1 wrote, where c2's own bindings[c2][p] = NONE so the
\* expected lookup result is DefaultSource but audit_lookup[c2][p] is
\* the source c1 bound.
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1, c2}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank, s_archive}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = TRUE
    BuggyDetachLeaks              = FALSE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = FALSE
    EnableMultiBind               = FALSE
    BuggyMultiBindNoRollback      = FALSE
    BuggyMultiBindTruncateOnly    = FALSE

INVARIANTS
    Invariants
