\* Fixed config — snapshot lifecycle: chain of up to 3 snapshots over
\* a 5-txg window with 2 abstract tree-root values. Exercises Create,
\* Delete, Hold, Release, Write interactions.
SPECIFICATION Spec

CONSTANTS
    MaxSnaps = 3
    MaxTxg = 5
    TreeRoots = {"r0", "r1"}
    BuggyDeleteWithHold = FALSE
    BuggyChainOutOfOrder = FALSE
    BuggyExtentTxgUnbounded = FALSE

INVARIANTS
    TypeOK
    BirthTxgMonotonic
    HoldPreventsDelete
    ChainTxgOrdered
    ChainAcyclic
    MostRecentValid
    SnapIdMonotonic
    ExtentTxgBoundedBySync
    ChainExtentTxgOrdered
