\* Buggy variant — AllocReused does not bump gen.
\*
\* Real-world failure mode: a buggy ino allocator's "reuse free
\* slot" path forgets to increment the generation counter, allowing
\* a freshly-allocated ino to share its (ino, gen) tuple with a
\* prior allocation. This is the canonical confused-deputy attack
\* surface: a 9P client holding a fid for (ino=X, gen=5) sees its
\* fid silently rerouted to a different file when ino X gets freed
\* and re-issued at gen=5 again.
\*
\* Expected verdict: TLC fires TupleUniqueAllTime — two history
\* entries for the same ino with the same gen but different event
\* ids.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1, i2}
    MaxGen                       = 2
    MaxNlink                     = 2
    BuggyReuseNoGenBump          = TRUE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = FALSE
    MaxFileLen                   = 0
    MaxInline                    = 0
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
