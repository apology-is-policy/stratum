SPECIFICATION Spec
INVARIANT Invariants
CONSTANTS
    \* R41 P3-4 (P7-9): bumped MaxFileBlocks 2 → 3 + MaxPaddrs 4 → 5 so
    \* Truncate's branch (b) — the partial-shrink path with a crossing
    \* extent — exposes states distinct from any Overwrite-equivalent
    \* state. With MaxFileBlocks=2 the only crossing case (off=0, len=2,
    \* new_size=1) collapses onto an Overwrite reachable state; with
    \* MaxFileBlocks=3 the (off=0, len=3, new_size=2) case yields a
    \* prefix len=2 distinct from any 1-block write/overwrite.
    MaxDatasets = 1
    MaxInos = 2
    MaxFileBlocks = 3
    MaxPaddrs = 5
    MaxTxg = 1
    MaxReplicasPerExtent = 2
    \* P7-10: KeyIds bound = 1 here (every extent stamps key_id = 0)
    \* keeps the P7-9-bumped state space tractable at this cfg. The
    \* key_id field has TypeOK closure; cross-key_id state interactions
    \* are exercised by extent_keyids.cfg (smaller other bounds +
    \* MaxKeyIds = 2). Load-bearing rotation invariants live in
    \* key_schema.tla.
    MaxKeyIds = 1
    \* P7-16: Reflink disabled at this cfg's bounds to keep state space
    \* tractable — extent_reflink.cfg covers Reflink at smaller bounds.
    \* Justification: extent.cfg's purpose is P7-9 partial-shrink and
    \* P7-10 key_id-rotation invariants in a wide paddr/offset state
    \* space; Reflink at this cfg adds 30+ outdegree per state and pushes
    \* runtime past the project's CI budget.
    DisableReflink = TRUE
    BuggyWriteAllowsOverlap = FALSE
    BuggyZeroLength = FALSE
    BuggyOverwriteForgetsDrop = FALSE
    BuggyReplicaPaddrCollision = FALSE
    BuggyReflinkRotatesOrigin = FALSE
