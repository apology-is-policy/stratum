\* P9-9P-0 buggy variant — Detach drops attached but leaks the
\* connection's fid table.
\*
\* Real-world failure mode: the 9P server's connection-close path
\* tears down the socket + connection state but forgets to walk
\* the connection's fid table releasing each slot. If the
\* connection's slot in the daemon's connection array is then
\* reused by a fresh Tattach from a different client, the new
\* client inherits the prior client's open capabilities — every
\* fid from the old session is silently still bound.
\*
\* The class is broader than ClunkClears: even without any prior
\* Clunk, a connection close should clear ALL fids of that
\* connection. DetachClears asserts the structural property
\* directly: ~attached[c] => every fid is NONE.
\*
\* Expected verdict: TLC fires DetachClears via:
\*   Attach(c1, f1)             \* fids[c1][f1] = <<i_root, 0>>;
\*                                  attached[c1]=TRUE
\*   Detach(c1)                 \* under bug: fids unchanged,
\*                                  attached[c1]=FALSE
\*                                  → DetachClears fires (attached[c1]
\*                                  is FALSE but fids[c1][f1] /= NONE).
\*                                  ClunkClears ALSO fires because
\*                                  Detach sets pending_clear[c1][*]
\*                                  for every fid — both invariants
\*                                  surface different facets of the
\*                                  same leak.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = FALSE
    BuggyWalkSnapshotsStaleGen    = FALSE
    BuggyClunkLeaksFid            = FALSE
    BuggyDetachLeaksFids          = TRUE

INVARIANTS
    Invariants
