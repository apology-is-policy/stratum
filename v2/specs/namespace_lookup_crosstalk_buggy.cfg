\* Buggy variant — Lookup(c, p) reads from the OTHER connection's
\* bindings table. Models a Twalk handler that demultiplexes fids
\* to the wrong per-connection state (e.g., wrong index into
\* connections[]).
\*
\* Real-world failure mode: src/9p/ Twalk handler uses fid->cid
\* but cid is uninitialized / off-by-one / leaked across handler
\* invocations.
\*
\* Expected verdict: TLC fires LookupReflectsOwnBindings — c1 binds
\* path p to source s; c2 (with NONE at p) does Lookup(c2, p) and
\* observes s instead of DefaultSource.
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1, c2}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = FALSE
    BuggyDetachLeaks              = FALSE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = TRUE
    EnableMultiBind               = FALSE
    BuggyMultiBindNoRollback      = FALSE
    BuggyMultiBindTruncateOnly    = FALSE

INVARIANTS
    Invariants
