\* P9.5-PARALLEL-1 buggy variant: stm_ctl_destroy without worker drain.
\*
\* Models the pre-PARALLEL-1 lifecycle hazard: stratumd at shutdown
\* tears down stm_ctl while a detached /ctl/ worker is still inside a
\* vops dispatch. The worker's cn->ctl back-pointer is then dangling;
\* its next read into c->pool / c->event_buf is UAF.
\*
\* Enables BuggyDestroyUAF = TRUE so DestroySharedBuggy is callable
\* regardless of workerCount.
\*
\* Expected verdict: TLC fires LifecycleNoUAF within ~5 states.
\* Trace:
\*   1. AcceptConn(c1, 1)   → conns={c1}; workerCount=1; aliveCtl=TRUE
\*   2. DestroySharedBuggy  → aliveCtl=FALSE; conns still {c1}
\*      → LifecycleNoUAF fails: conns ≠ {} but aliveCtl = FALSE.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Conns                   = {c1, c2}
    Fids                    = {f1}
    Qids                    = {q_state, q_admin}
    Uids                    = {0, 1, 2}
    AdminUid                = 2
    NoCaller                = NoCaller
    NoOwner                 = NoOwner
    MaxOpens                = 1
    BuggySharedSessions     = FALSE
    BuggySharedCaller       = FALSE
    BuggyDestroyUAF         = TRUE

INVARIANTS
    AllInvariants
