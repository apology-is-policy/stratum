\* P9.5-PARALLEL-1: healthy ctl-conn config — the canonical green run.
\*
\* Two connections, one fid per conn, two qids (admin + state), three
\* uids (0 = root, 1 = non-admin, 2 = admin). MaxOpens = 1 keeps the
\* per-conn fid table at most one slot — sufficient to demonstrate the
\* cross-conn-aliasing pattern without inflating state.
\*
\* Expected verdict: TLC explores every interleaving of AcceptConn /
\* OpenFid / ReadFidGood / AdminProbeGood / ClunkGood / DestroyConn /
\* DestroyShared across the two conns. No invariants fire.
\*   - The buggy alternates (ReadFidShared, AdminProbeShared,
\*     ClunkShared, DestroySharedBuggy) are gated off by the FALSE
\*     buggy flags; their preconditions are never satisfied.
\*   - sharedSessions / sharedCaller stay empty / NoCaller. Per-conn
\*     state is the only mutated branch.
\*
\* State-space estimate: reachable state under 50K; check time well
\* under 30 s on a typical workstation.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Conns                   = {c1, c2}
    Fids                    = {f1}
    Qids                    = {q_state, q_admin}
    Uids                    = {0, 1, 2}
    AdminUid                = 2
    NoCaller                = NoCaller
    NoOwner                 = NoOwner
    MaxOpens                = 1
    BuggySharedSessions     = FALSE
    BuggySharedCaller       = FALSE
    BuggyDestroyUAF         = FALSE

INVARIANTS
    AllInvariants
