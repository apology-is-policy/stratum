\* P9-9P-0 buggy variant — Clunk doesn't clear the fid binding,
\* but pending_clear is set TRUE regardless (the connection's
\* INTENT was to clunk; the server failed to follow through).
\*
\* Real-world failure mode: the 9P server's Tclunk handler
\* releases backend resources (file descriptor, lock-owner
\* releases) but forgets to clear the in-memory fid table slot.
\* The fid stays bound, a subsequent Tread on it surprises the
\* server (post-clunk IO) — and worse, the stale binding can
\* survive an inode reuse cycle, becoming a stale-fid attack
\* vector that the IO gate (covered by IOOnlyAgainstCurrentGen)
\* would catch BUT only if the binding is freshly cared about
\* by the new occupant of the ino.
\*
\* Expected verdict: TLC fires ClunkClears via:
\*   Attach(c1, f1)             \* fids[c1][f1] = <<i_root, 0>>;
\*                                  pending_clear[c1][f1]=FALSE
\*   Clunk(c1, f1)              \* under bug: fids unchanged,
\*                                  pending_clear[c1][f1]=TRUE
\*                                  → invariant fires immediately.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = FALSE
    BuggyWalkSnapshotsStaleGen    = FALSE
    BuggyClunkLeaksFid            = TRUE
    BuggyDetachLeaksFids          = FALSE

INVARIANTS
    Invariants
