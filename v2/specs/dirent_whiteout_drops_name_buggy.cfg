\* P8-POSIX-9b: Whiteout action converts slot to TOMBSTONE instead
\* of WHITEOUT, dropping the name field. From a spec-state
\* perspective both transitions remove the name from links AND
\* leave a non-record-non-empty slot, so chain integrity is
\* preserved. The OBSERVABLE failure is at the readdir emission
\* layer: tombstones aren't emitted, so overlayfs userspace would
\* miss the whiteout marker at the source name post-rename.
\*
\* The spec doesn't fire a clean invariant for this buggy variant
\* because both shapes (TOMBSTONE vs WHITEOUT) are valid post-
\* removal slot states. The readdir-emission semantic is checked
\* by the C impl's tests directly (a whiteout MUST appear in
\* readdir output; a tombstone MUST NOT). This cfg exists for
\* documentation completeness — TLC verdict is GREEN under the
\* bug, confirming the spec model itself doesn't pin the
\* readdir-emission requirement at the abstract slot level. The
\* runtime requirement is enforced by tests in test_dirent.c
\* and test_fs_phase8.c (rename_whiteout_emits_in_readdir,
\* readdir_emits_whiteout_with_correct_type).
\*
\* If a future iteration of the spec wants to formally pin this
\* shape: add a write-side invariant `WhiteoutPostRemovalShape`
\* that says "every Whiteout action transition leaves a WHITEOUT
\* slot (not TOMBSTONE) at the affected slot index" — TLA+ doesn't
\* directly support post-action assertions on action effects, but
\* a [Whiteout]_vars => action property could express it.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = TRUE
    BuggyWhiteoutDropsName              = TRUE
    BuggyLookupReturnsRecordOnWhiteout  = FALSE

INVARIANTS
    Invariants
