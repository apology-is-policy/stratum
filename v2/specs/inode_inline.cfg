\* P8-POSIX-5 — healthy inline-data model.
\*
\* Smaller bounds than the canonical `inode.cfg` so the data_kind /
\* data_len / ever_extent state space stays tractable. One ino,
\* MaxGen=1, MaxNlink=1 — focuses on the inline-vs-extent transition
\* rather than the alloc/reuse/link/unlink lifecycle (which has
\* canonical coverage in the larger config).
\*
\* MaxFileLen = 3, MaxInline = 1 — files of size 0 / 1 fit inline;
\* sizes 2 / 3 require extent storage. The asymmetry exercises the
\* WriteInline → TransitionToExtent → WriteExtent path AND the
\* TruncateExtent → (stay-EXTENT) one-way path.
\*
\* Expected verdict: TLC explores the full inline / extent
\* transition space + lifecycle interactions; all 10 invariants
\* (incl. the 3 P8-POSIX-5 inline ones) hold.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1}
    MaxGen                       = 1
    MaxNlink                     = 1
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = TRUE
    MaxFileLen                   = 3
    MaxInline                    = 1
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = FALSE
    EnableOrphanModel            = FALSE
    BuggyAllocAnonClaimsLinked   = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
