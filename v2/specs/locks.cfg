\* P8-POSIX-7d: healthy lock-table config.
\*
\* Two inos, two owners, MaxOff=4. State space is bounded but
\* large enough to exercise: same-owner stacking, different-owner
\* conflict, exclusive-vs-shared admission.
\*
\* Expected verdict: TLC explores all interleavings without firing
\* NoConflictingLocks or ExclusiveExcludesDifferentOwner.
\*
\* CHECK_DEADLOCK FALSE: with locks = {} and Acquire's preconditions
\* satisfied for many parameter combinations, terminal states only
\* arise when the bounded state space is exhausted — TLC sees this
\* as "no enabled action" without the override.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                       = {i1, i2}
    Owners                     = {o1, o2}
    MaxOff                     = 4
    BuggyOwnerCheckMissing     = FALSE
    BuggyShared_Excl_Granted   = FALSE

INVARIANTS
    Invariants
