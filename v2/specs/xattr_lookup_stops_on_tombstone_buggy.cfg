\* Buggy variant — Lookup terminates on TOMBSTONE.
\*
\* Repro: Set(n_a) → slot 0; Set(n_b) collides → slot 1.
\* Remove(n_a) leaves TOMBSTONE at slot 0 (healthy). Lookup(n_b)
\* under the bug walks slot 0, sees TOMBSTONE, treats it as EMPTY,
\* returns NONE — despite (n_b, val) being in `pairs`.
\*
\* Expected verdict: LookupAgreesWithPairs fires.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                                = {i1}
    Names                               = {"n_a", "n_b", "n_c"}
    Values                              = {v1, v2}
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = TRUE

INVARIANTS
    Invariants
