CONSTANTS
    \* P7-10: small-bound cfg that exercises key_id stamping with two
    \* distinct keys (e.g., one extent stamped under key_id=0, another
    \* under key_id=1 — modeling pre- vs post-rotation extents). Other
    \* bounds shrunk back to the pre-P7-9 size to keep state space
    \* tractable. extent.cfg's larger bounds with MaxKeyIds=1 cover the
    \* P7-9 truncate partial-shrink path complementarily.
    MaxDatasets = 1
    MaxInos = 2
    MaxFileBlocks = 2
    MaxPaddrs = 4
    MaxTxg = 1
    MaxReplicasPerExtent = 2
    MaxKeyIds = 2
    BuggyWriteAllowsOverlap = FALSE
    BuggyZeroLength = FALSE
    BuggyOverwriteForgetsDrop = FALSE
    BuggyReplicaPaddrCollision = FALSE
