\* Buggy-impl model check: RequireRedundancyCheck=FALSE. Demonstrates
\* that without the mirror_n preservation guard on RemoveDevice, the
\* pool can be driven below its redundancy floor — any subsequent
\* FailDevice leaves it unable to satisfy mirror_n reads/writes.
\*
\* Expect: RedundancyPreservedOnRemove VIOLATED at a depth of at most
\* 2 steps — from initial state (MirrorN=2 devices ONLINE), a single
\* unguarded RemoveDevice drops the roster to 1, below MirrorN=2.

CONSTANTS
    AllDevices              = {1, 2, 3, 4}
    MirrorN                 = 2
    MaxGen                  = 4
    RequireRedundancyCheck  = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    RedundancyPreservedOnRemove
    AddDeviceIdempotent
    ReconcileRestoresState
    NoOrphanOnRemove
