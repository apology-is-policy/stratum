\* Buggy config — Readdir emits the tombstone slot as a record.
\*
\* Repro: Create(n_a) → slot 0 = (n_a, record). Unlink(n_a) leaves
\* slot 0 = TOMBSTONE (healthy write path). ReaddirReset starts an
\* iteration; ReaddirStep at probe 0 under the bug appends the
\* TOMBSTONE slot value to emit_log instead of skipping it.
\*
\* Expected verdict: ReaddirNoTombstoneEmitted fires within a few
\* states — the emit_log carries an entry with kind = "tombstone",
\* which the C impl would surface to userspace as a synthetic
\* dirent with zeroed (ino, name) fields.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = TRUE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE

INVARIANTS
    Invariants
