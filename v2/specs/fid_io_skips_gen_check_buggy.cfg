\* P9-9P-0 buggy variant — IOSuccess admits any bound fid, ignoring
\* the cached_gen vs current_gen comparison and the alive flag.
\*
\* Real-world failure mode: the 9P server's Tread/Twrite/Tgetattr
\* handlers fetch the inode by ino but skip the (ino, gen) tuple
\* check at the boundary. A 9P client holding fid F → ino X gen 5
\* still gets reads/writes routed to ino X gen 6 after a delete-
\* and-reuse cycle. Cross-references inode.tla's TupleUniqueAllTime
\* invariant — that one ensures gen actually moves; THIS one
\* ensures the runtime gate uses the gen check.
\*
\* Expected verdict: TLC fires IOOnlyAgainstCurrentGen. (R91 P3-3:
\* TLC's actual shortest-path counterexample (depth 7) takes the
\* alive-flag path; the gen-mismatch path is one of two minimal
\* chains. TLC may surface either depending on BFS order.)
\*
\* Gen-mismatch chain:
\*   ReuseAlloc(i_other)         \* gen 0 → 1, alive
\*   Attach(c1, f1)              \* fids[c1][f1] = <<i_root, 0>>
\*   Walk(c1, f1, f2, i_other)   \* fids[c1][f2] = <<i_other, 1>>
\*   Free(i_other)               \* alive=FALSE, gen still 1
\*   ReuseAlloc(i_other)         \* gen 1 → 2, alive
\*   IOSuccess(c1, f2)           \* under bug, fires; cached=1 /= 2
\* records audit_io[c1][f2] = <<TRUE, 1, 2, TRUE>>; invariant fires.
\*
\* Alive-flag chain (shorter — TLC's BFS reaches first at depth 7):
\*   ReuseAlloc(i_other)         \* gen 0 → 1, alive
\*   Attach(c2, f1)              \* fids[c2][f1] = <<i_root, 0>>
\*   Walk(c2, f1, f1, i_other)   \* fids[c2][f1] = <<i_other, 1>>
\*   Free(i_other)               \* alive=FALSE, gen still 1
\*   IOSuccess(c2, f1)           \* under bug, fires with cached=1,
\*                                  current=1, alive=FALSE
\* records audit_io[c2][f1] = <<TRUE, 1, 1, FALSE>>; invariant
\* fires because TRUE /= (1=1 /\ FALSE) = FALSE.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = TRUE
    BuggyWalkSnapshotsStaleGen    = FALSE
    BuggyClunkLeaksFid            = FALSE
    BuggyDetachLeaksFids          = FALSE
    BuggyIORejectFalseAlarms      = FALSE

INVARIANTS
    Invariants
