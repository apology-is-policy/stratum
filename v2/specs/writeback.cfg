SPECIFICATION Spec
INVARIANT Invariants
CONSTANTS
    \* Smallest bounds that exercise every action transition + invariant.
    \* MaxInos = 2 — let two inodes coexist so per-inode + global caps
    \*               diverge and BufferedWrite's cap gating is exercised.
    \* MaxOff = 3  — three offsets minimum to exercise overlap (write at
    \*               0+len=2, write at 1+len=1, overlap at 1) and holes
    \*               (off=2 with only a 0+len=2 write existing).
    \* MaxPaddrs = 4 — enough for two extents to coexist post-Flush
    \*                 + one for a DirectWrite at the same state +
    \*                 one for a Crash + redo sequence.
    \* MaxTxg = 2 — Commit advances txg; need ≥ 2 so post-Commit states
    \*              are reachable.
    \* MaxSeq = 4 — bound writer-issued seq stamps to keep TLC tractable.
    \*              Allows BufferedWrite + DirectWrite + Flush + Crash
    \*              + retry sequences within a single trace.
    \* InodeCapBlocks = 2 — small enough that a 2-block write fills the
    \*                      cap and a 3rd write must Flush first.
    \* GlobalCapBlocks = 3 — strictly < 2 * InodeCapBlocks so both inodes
    \*                       can't be full simultaneously; exercises the
    \*                       global-cap gate.
    MaxInos          = 2
    MaxOff           = 3
    MaxPaddrs        = 4
    MaxTxg           = 2
    MaxSeq           = 4
    InodeCapBlocks   = 2
    GlobalCapBlocks  = 3
    BuggyReadSkipsBuffer  = FALSE
    BuggyFlushReusesPaddr = FALSE
