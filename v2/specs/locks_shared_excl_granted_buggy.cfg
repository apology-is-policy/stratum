\* P8-POSIX-7d buggy variant: Conflicts() returns FALSE for
\* SHARED+EXCLUSIVE pairs across different owners. Acquire's
\* refusal predicate fails to fire, two conflicting locks coexist,
\* NoConflictingLocks fires.
\*
\* Expected trace:
\*   Acquire(i1, o1, "shared",    0, 2)  → admitted
\*   Acquire(i1, o2, "exclusive", 0, 2)  → admitted (bug allows it)
\*   NoConflictingLocks fires on the now-coexisting pair.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                       = {i1, i2}
    Owners                     = {o1, o2}
    MaxOff                     = 4
    BuggyOwnerCheckMissing     = FALSE
    BuggyShared_Excl_Granted   = TRUE

INVARIANTS
    Invariants
