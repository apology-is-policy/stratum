SPECIFICATION Spec

\* Seven-key instance with Sep1=3 and Sep2=5, giving three ranges:
\* k<3, 3<=k<5, 5<=k. InitialKeys={2,4,6} places exactly one present
\* and one absent key in each range — ABSENT / PRESENT coverage across
\* both sides of every routing decision. Two readers.
CONSTANTS
    Keys          = {1, 2, 3, 4, 5, 6, 7}
    Sep1          = 3
    Sep2          = 5
    InitialKeys   = {2, 4, 6}
    ReaderThreads = {r0, r1}

INVARIANTS
    Invariants
