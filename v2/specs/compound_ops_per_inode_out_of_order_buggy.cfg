\* P9.5-PARALLEL-3 buggy config: out-of-order lock acquisition.
\*
\* Same bounds as the main cfg but BuggyOutOfOrderAcquire = TRUE enables
\* the CompoundOpAcquireOutOfOrder action. A writer can acquire ANY
\* unacquired target — not just the ascending-minimum. With two writers
\* both targeting both inodes, the canonical 2-cycle deadlock becomes
\* reachable.
\*
\* The invariant that fires FIRST depends on what TLC explores first.
\* The static-local invariant LockOrderPreserved trips immediately when
\* a writer acquires a target that isn't the smallest unacquired:
\*
\*   State 0: locks free, no writer in op
\*   CompoundOpStart(w1, {1, 2}) →
\*   State 1: w1 in op, targets={1,2}, held={}
\*   CompoundOpAcquireOutOfOrder(w1, 2) →                ← THE BUG
\*   State 2: w1 holds {2}, inode_lock_holder[2] = w1
\*       LockOrderPreserved check: ∀ j ∈ {2}. ∀ i ∈ {1, 2}. (i < j) ⇒ i ∈ held?
\*           j=2, i=1: 1 < 2 ⇒ 1 ∈ {2}? FALSE.
\*       → LockOrderPreserved FIRES.
\*
\* In a model with LockOrderPreserved disabled, the deadlock cycle
\* surfaces in NoCircularWait:
\*
\*   State 0: locks free
\*   CompoundOpStart(w1, {1, 2}) → CompoundOpStart(w2, {1, 2}) →
\*   CompoundOpAcquireOutOfOrder(w1, 2) → CompoundOpAcquireOutOfOrder(w2, 1) →
\*   State 4: w1 holds {2}, w2 holds {1}. Both want the other inode.
\*       NoCircularWait check: WaitsFor(w1, w2) /\ WaitsFor(w2, w1)? TRUE.
\*       → NoCircularWait FIRES.
\*
\* Expected verdict: TLC fires LockOrderPreserved within 2-3 states.
\* If only NoCircularWait were checked, the cycle would surface within
\* ~5 states. Either is a valid catch — both demonstrate that out-of-
\* order acquisition is unsafe.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    NumInodes                   = 2
    MaxOps                      = 2
    MaxStepsPerOp               = 1
    MaxReadsPerReader           = 1
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyOutOfOrderAcquire      = TRUE
    BuggyReleaseOneInodeMid     = FALSE

INVARIANTS
    AllInvariants
