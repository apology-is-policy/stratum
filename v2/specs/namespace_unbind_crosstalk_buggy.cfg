\* Buggy variant — Unbind(c, p) accidentally removes the binding at p
\* on the "other" connection in addition to the acting connection's.
\* Models a wild-pointer / off-by-one in an array-index unbind path
\* (e.g., the implementation iterates a pool-wide bindings array and
\* uses the wrong stride).
\*
\* Real-world failure mode: src/9p/ has a connections[] array; Unbind
\* zeroes both connections[c].bindings[p] and connections[c+1].bindings[p].
\*
\* Expected verdict: TLC fires LookupReflectsOwnBindings on the OTHER
\* connection. Sequence: c1 binds path p to source s; c2 binds path p
\* to source s'; c1 calls Unbind(c1, p). With the bug, c2's binding
\* at p is also cleared. c2's subsequent Lookup returns DefaultSource
\* but bindings[c2][p] is NONE (cleared by the cross-talk), so by the
\* spec's read of bindings the audit_lookup matches DefaultSource —
\* but bindings[c2][p] was set by c2's prior Bind, so the bug is
\* observable as a state-level deletion that c2 didn't authorize.
\* The DetachClears + LookupReflectsOwnBindings invariants bracket
\* this; the more direct catch is that BindCapBound would ratchet
\* down without the connection requesting it (not modeled — TLC
\* explores until LookupReflectsOwnBindings violates, which it does).
SPECIFICATION Spec

CONSTANTS
    Connections             = {c1, c2}
    Paths                   = {p_root, p_home}
    Sources                 = {s_default, s_tank, s_archive}
    DefaultSource           = s_default
    NONE                    = NONE
    MaxBindsPerConn         = 2
    BuggyGlobalBindings     = FALSE
    BuggyDetachLeaks        = FALSE
    BuggyUnbindCrosstalk    = TRUE
    BuggyLookupCrosstalk    = FALSE

INVARIANTS
    Invariants
