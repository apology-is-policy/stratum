\* P9-9P-0 R91 P2-2 buggy variant — IOReject fires even when the
\* fid's cached_gen matches current_gen and the inode is alive.
\* Demonstrates the false-negative DoS class: a valid client gets
\* ESTALE for no reason, and the file becomes inaccessible.
\*
\* Real-world failure mode: the 9P server's stale-detection logic
\* compares cached_gen against a different stable-id (e.g., a
\* per-mount nonce that legitimately differs from the inode's gen),
\* OR a flag bit gets toggled on an unrelated cache invalidation
\* and is mis-interpreted as "stale". Subsequent IO returns ESTALE
\* despite the file being alive at the cached gen.
\*
\* The headline IOOnlyAgainstCurrentGen invariant is biconditional:
\* observed_ok IFF (cached = current /\ alive). The healthy IOReject
\* gate ensures cached /= current OR ~alive, so observed_ok=FALSE
\* implies the right side is FALSE — invariant holds.
\*
\* Under the bug, IOReject can fire when the right side is TRUE,
\* recording observed_ok=FALSE while the gate condition is TRUE —
\* invariant fires immediately on the next IOReject of a healthy
\* fid.
\*
\* Expected verdict: TLC fires IOOnlyAgainstCurrentGen via:
\*   Attach(c1, f1)              \* fids[c1][f1] = <<i_root, 0>>;
\*                                  current_gen[i_root]=0, alive
\*   IOReject(c1, f1)            \* under bug, fires with cached=0,
\*                                  current=0, alive=TRUE
\* records audit_io[c1][f1] = <<FALSE, 0, 0, TRUE>>; the invariant
\* asserts observed_ok = (0=0 /\ TRUE) = TRUE, but observed_ok =
\* FALSE — violation, fires.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = FALSE
    BuggyWalkSnapshotsStaleGen    = FALSE
    BuggyClunkLeaksFid            = FALSE
    BuggyDetachLeaksFids          = FALSE
    BuggyIORejectFalseAlarms      = TRUE

INVARIANTS
    Invariants
