\* Fixed config — dataset hierarchy with 3 ids (root + 2 child slots) and
\* a 2-name alphabet. MaxTxg=4 admits up to 3 Creates plus reshuffling.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 3
    Names = {"n1", "n2"}
    MaxTxg = 4
    BuggyAllowCycles = FALSE
    BuggyAllowDuplicateName = FALSE
    BuggyDestroyNonLeaf = FALSE

INVARIANTS
    TypeOK
    RootInvariant
    ForestStructure
    SiblingNameUnique
    IdMonotonic
    BirthTxgMonotonic
    CreatedTxgStable
