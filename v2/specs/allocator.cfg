SPECIFICATION Spec

\* Three ranges, three owners (one main + two snapshots) — enough to
\* exercise ref/unref crossover + deferred-free across multiple
\* commits without exploding the state space. MaxGen=3 gives room for
\* allocate/free/commit/re-allocate cycles.
CONSTANTS
    Ranges     = {r1, r2, r3}
    Owners     = {main, s1, s2}
    MainOwner  = main
    MaxGen     = 3

INVARIANTS
    Invariants
