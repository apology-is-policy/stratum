\* P9-SLATE-2 buggy: enable BuggyDisconnectIncomplete action.
\*
\* BuggyDisconnectIncomplete clears socket+connected on disconnect
\* but leaves panelPath set to RootPath. After: connected = FALSE
\* but panelPath[p] = RootPath → PanelPathConsistent fires.
\*
\* Expected verdict: TLC reports a counterexample on PanelPathConsistent
\* within a few steps. (Healthy Attach → panelPath[L] = "/"; then
\* BuggyDisconnectIncomplete → connected = FALSE while panelPath[L] = "/".)
SPECIFICATION Spec

CONSTANTS
    EventVals                = {e1}
    MaxEvents                = 1
    Sockets                  = {s1}
    Panels                   = {L, R}
    MaxConfigChanges         = 2
    BuggyReorder             = FALSE
    BuggyVersionDecrement    = FALSE
    BuggyAttachSplitState    = FALSE
    BuggyDisconnectKeepsPath = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
