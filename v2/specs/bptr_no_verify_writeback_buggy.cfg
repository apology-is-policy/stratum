\* Buggy demo — cb skips read-back-after-rewrite. Writes are recorded as
\* OK_UNVERIFIED instead of OK_VERIFIED. Expected: WriteVerifyMandatory
\* fires when result=REPAIRED but a rewrite_outcome ∉ {NONE, OK_VERIFIED}.
\*
\* Scenario: replica 1 is OK, replica 2 is CORRUPT. Buggy
\* RewriteReplica(2) records OK_UNVERIFIED. RewriteComplete classifies
\* as REPAIRED (no FAIL outcome). Invariant fires at phase=DONE.
SPECIFICATION Spec

CONSTANTS
    NReplicas = 2
    InitialReplicaStates <- ReplicaStates_OK_CORRUPT
    RewriteCanFail = FALSE
    BuggyAcceptCorrupt = FALSE
    BuggyNoVerifyWriteback = TRUE

INVARIANTS
    WriteVerifyMandatory
