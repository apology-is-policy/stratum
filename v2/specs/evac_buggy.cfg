\* Buggy-impl model check: AtomicEvacuation = FALSE.
\* Per-block evacuation splits into Release (drop d) then Write (add s),
\* models the commit-order bug of releasing the alloc-tree entry before
\* the mirror_write lands. Any interleaving leaves replicas[b] temporarily
\* under-replicated.
\*
\* Expect: EvacuationAtomic VIOLATED at depth 3 — Init → BeginEvacuation
\* → ReleaseOnly → state with |replicas[b] ∩ Live| = MirrorN-1.

CONSTANTS
    AllDevices           = {1, 2, 3}
    Blocks               = {1, 2}
    MirrorN              = 2
    AtomicEvacuation     = FALSE
    DrainCheckOnRemove   = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    EvacuationAtomic
    AtMostOneEvacuating
    RedundancyPreservedDuringEvacuation
    NoTargetReplicasAfterComplete
