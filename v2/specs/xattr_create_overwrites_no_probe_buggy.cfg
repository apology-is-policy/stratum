\* Buggy variant — Set writes blindly at slot Hash[name], skipping
\* the probe loop and overwriting any colliding occupant.
\*
\* Repro: Set(n_a) → slot 0 = (n_a, v1). Set(n_b) under the bug
\* writes at Hash[n_b] = 0, overwriting (n_a) with (n_b, v2). The
\* `pairs` oracle has both, but slots holds only (n_b).
\*
\* Expected verdict: SlotsAgreeWithPairs fires.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                                = {i1}
    Names                               = {"n_a", "n_b", "n_c"}
    Values                              = {v1, v2}
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = TRUE
    BuggyLookupStopsOnTombstone         = FALSE

INVARIANTS
    Invariants
