\* P9.5-PARALLEL-3 main cfg: healthy per-inode locking under the
\* ascending-order discipline.
\*
\* Two writers + two inodes. Each writer's op_targets is non-deterministically
\* chosen at CompoundOpStart from { {1}, {2}, {1,2} } — exercising every
\* combination of single-inode and two-inode compound ops.
\*
\* MaxOps=2 + MaxSteps=1 + MaxReads=1 keeps the state space tight. The
\* key reachability scenarios this exercises:
\*   - Both writers want disjoint inodes ({1} and {2}); proceed in
\*     parallel; no contention.
\*   - Both writers want the same single inode ({1} and {1}); ascending
\*     order forces serialization on that inode.
\*   - Both writers want both inodes ({1,2} and {1,2}); both must
\*     acquire 1 first; one waits; no deadlock cycle.
\*   - Mixed: w1 wants {1}, w2 wants {1, 2}. w1 acquires 1, w2 acquires
\*     none yet. w1 commits → releases 1. w2 acquires 1 then 2.
\*
\* Expected verdict: TLC explores ~100-500K reachable states. All six
\* invariants (TypeOK + WriterAtomicPerInode + LockOrderPreserved +
\* NoCircularWait + PerSubsystemLinearizable + NoNegativeCounters)
\* hold. No deadlock — even when both writers want both inodes, the
\* ascending-order rule guarantees one writer can always make progress.
\*
\* CHECK_DEADLOCK FALSE — terminal states (both writers committed up to
\* MaxOps) are valid completions, not deadlocks. The model's safety
\* property NoCircularWait captures the runtime-deadlock concern.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    NumInodes                   = 2
    MaxOps                      = 2
    MaxStepsPerOp               = 1
    MaxReadsPerReader           = 1
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyOutOfOrderAcquire      = FALSE
    BuggyReleaseOneInodeMid     = FALSE

INVARIANTS
    AllInvariants
