\* Buggy-impl model check: BuggyResume = TRUE.
\*
\* Models an impl where PAUSED → RUNNING via Resume drops cursor and
\* counters back to zero (e.g. a "restart from the top on resume"
\* misreading of the Pause semantics).
\*
\* Expect: PauseResumeIdempotent VIOLATED after a non-trivial Pause
\* followed by Resume. Counterexample trace:
\*   Init → Start → StepClean(1) → Pause → Resume
\* Post-Resume: cursor = 0, snapshot_cursor = 1. Invariant
\* `state \in {PAUSED,RUNNING} /\ snapshot_cursor > 0 => cursor >= snapshot_cursor`
\* fires: cursor = 0 < 1 = snapshot_cursor.

CONSTANTS
    NumBlocks        = 3
    CorruptBlocks    = {2}
    BuggyResume      = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    StateMachineValid
    CursorBounded
    ProcessedCount
    CompletedIffDrained
    IdleMeansZero
    PauseResumeIdempotent
    SnapshotPinnedWhilePaused
    NoWorkWhenIdleOrCompleted
