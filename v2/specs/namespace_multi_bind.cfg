\* Healthy multi-bind config — exercises the StartBatch / ApplyNext /
\* CommitBatch / AbortBatch state machine modeling the C impl's
\* apply_attach_spec semantics. Both abort-restore and commit paths
\* are explored; no buggy variants enabled.
\*
\* Bound aggressively: 1 connection (atomicity is single-connection;
\* cross-connection isolation is covered by the existing namespace.cfg
\* with 2 connections). Paths = 2, Sources = 2 + DefaultSource = 3,
\* MaxBindsPerConn = 2. State space: each StartBatch picks a target_map
\* from 3^2 = 9 options (but bounded further by ASSUME); ApplyNext
\* applies entries non-deterministically; AbortBatch / CommitBatch
\* terminate. Expected: TLC explores all batch lifecycles + every
\* interleaving with non-batch Bind/Unbind/Detach/Attach/ObserveLookup
\* and reports zero invariant violations.
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank, s_archive}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = FALSE
    BuggyDetachLeaks              = FALSE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = FALSE
    EnableMultiBind               = TRUE
    BuggyMultiBindNoRollback      = FALSE
    BuggyMultiBindTruncateOnly    = FALSE

INVARIANTS
    Invariants
