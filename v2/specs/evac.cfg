\* Fixed-impl model check: AtomicEvacuation = TRUE.
\* Per-block evacuation is one atomic step (matches C impl's single
\* sync commit per step). Every reachable state has every block at
\* ≥ MirrorN replicas on live devices.
\*
\* Expect: all invariants hold. State space: Cardinality(AllDevices)=3,
\* Cardinality(Blocks)=2, MirrorN=2 — small (< 1000 reachable states).

CONSTANTS
    AllDevices           = {1, 2, 3}
    Blocks               = {1, 2}
    MirrorN              = 2
    AtomicEvacuation     = TRUE
    DrainCheckOnRemove   = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    EvacuationAtomic
    AtMostOneEvacuating
    RedundancyPreservedDuringEvacuation
    NoTargetReplicasAfterComplete
