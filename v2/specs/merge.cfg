SPECIFICATION Spec

\* Seven-key instance mirroring balanced.cfg's range coverage.
\* Sep1=3, Sep2=5 → three ranges: k<3, 3<=k<5, 5<=k.
\* InitialKeys={2,4} — one present key in L0's range, one in L1's range,
\* NONE in R's range (R empty per merge eligibility). Absent keys in
\* each range exercise ABSENT behavior; absent keys in [5, 7] exercise
\* R's forward-to-L1 path in Phase_Sealed.
CONSTANTS
    Keys          = {1, 2, 3, 4, 5, 6, 7}
    Sep1          = 3
    Sep2          = 5
    InitialKeys   = {2, 4}
    ReaderThreads = {r0, r1}

INVARIANTS
    Invariants
