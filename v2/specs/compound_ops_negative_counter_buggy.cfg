\* P9.5-PARALLEL-2 buggy config: compound-op step underflows a counter.
\*
\* Same bounds as the main cfg but BuggyNegativeCounter = TRUE enables
\* the CompoundOpStepUnchecked action that fires sub_x -= StepDelta
\* without checking sub_x >= StepDelta. Models a missed pre-flush:
\* e.g., a future compound op that frees a paddr in the allocator
\* before truncating the corresponding extent — the alloc counter
\* drops below the truth, eventually surfacing as a transiently-
\* negative gauge in the /ctl/ exposition.
\*
\* Reachable scenario (StepDelta=2, InitialCounter=4):
\*
\*   State 0: counter=[a|->4, b|->4], fs_lock_holder=NONE
\*   CompoundOpStart(w1) →
\*   State 1: fs_lock_holder=w1, in_flight_op=[w1|->1]
\*   CompoundOpStepUnchecked(w1, a, -1) ×3 →
\*       Each fires unconditionally:
\*       State 2: counter=[a|->2]
\*       State 3: counter=[a|->0]
\*       State 4: counter=[a|->-2]   ← NoNegativeCounters FIRES.
\*
\* Expected verdict: TLC fires NoNegativeCounters within ~6 states.
\* The trace demonstrates the missing-precondition bug.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    MaxOps                      = 2
    MaxStepsPerOp               = 3
    MaxReadsPerReader           = 2
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyReleaseLockMid         = FALSE
    BuggyNegativeCounter        = TRUE

INVARIANTS
    AllInvariants
