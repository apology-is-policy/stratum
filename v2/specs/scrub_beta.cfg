\* Fixed-impl model check, β-mode (cb installed): BuggyResume = FALSE,
\* CallbackSet = TRUE.
\*
\* Universe exercises all three cb outcomes in one run:
\*   NumBlocks = 3
\*   CorruptBlocks    = {2, 3}     \* blocks 2 and 3 are corrupt
\*   RepairableBlocks = {2}        \* block 2 is repairable; 3 is not
\*
\* Trace covered:
\*   Block 1: clean      → StepClean      → verified++
\*   Block 2: corrupt    → StepRepaired   → repaired++     (in RepairableBlocks)
\*   Block 3: corrupt    → StepUnrepairable → unrepairable++ (not in RepairableBlocks)
\*
\* Plus Pause / Resume / Restart / Reset variations interleaved.
\*
\* Expect: all invariants hold including
\*   ProcessedCount: verified + failed + repaired + unrepairable = cursor
\*   CallbackSetExclusivity: failed = 0 (β-mode)
\*   PauseResumeIdempotent: cursor preserved across Pause/Resume

CONSTANTS
    NumBlocks        = 3
    CorruptBlocks    = {2, 3}
    RepairableBlocks = {2}
    CallbackSet      = TRUE
    BuggyResume      = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    StateMachineValid
    CursorBounded
    ProcessedCount
    CallbackSetExclusivity
    CompletedIffDrained
    IdleMeansZero
    PauseResumeIdempotent
    SnapshotPinnedWhilePaused
    NoWorkWhenIdleOrCompleted
