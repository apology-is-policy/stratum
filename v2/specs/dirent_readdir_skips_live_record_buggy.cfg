\* Buggy config — Readdir advances the cursor past a live record
\* without emitting it.
\*
\* Repro: Create(n_a) → slot 0 = (n_a, record). ReaddirReset;
\* ReaddirStep at probe 0 under the bug advances iter to 1 but
\* leaves emit_log empty. Subsequent steps walk slot 1, slot 2 (both
\* EMPTY). ReaddirEnd fires with emit_log = <<>> despite a live
\* record at slot 0.
\*
\* Expected verdict: ReaddirCompleteAtEnd fires at the terminal state
\* (iter[d] = MaxProbe AND iter_active[d] = TRUE just before End)
\* — slots[d][0] holds a record but no entry in emit_log[d] has
\* probe = 0.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = TRUE

INVARIANTS
    Invariants
