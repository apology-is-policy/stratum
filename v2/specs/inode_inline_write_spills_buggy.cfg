\* P8-POSIX-5 buggy variant — WriteInline allows data_len > MaxInline
\* without transitioning to KIND_EXTENT.
\*
\* Repro: AllocFresh(i1) → kind=INLINE, len=0. WriteInline(i1, 2)
\* under the bug → kind stays INLINE, len=2 (which exceeds MaxInline=1).
\* The on-disk equivalent: si_inline_data is a 100-byte buffer; a
\* buggy write that sets si_data_len=200 with si_data_kind=
\* STM_DATA_INLINE would memcpy 200 bytes past the buffer's end on
\* read, corrupting the inode record.
\*
\* Expected verdict: TLC fires InlineLenBounded — kind=KIND_INLINE
\* AND data_len=2 > MaxInline=1.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1}
    MaxGen                       = 1
    MaxNlink                     = 1
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = TRUE
    MaxFileLen                   = 3
    MaxInline                    = 1
    BuggyTruncateReinlines       = FALSE
    BuggyInlineWriteSpills       = TRUE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
