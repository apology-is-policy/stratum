\* Buggy demo — Create / Rename / Move skip the sibling-name-availability
\* check. Expected: SiblingNameUnique violated when two children of the
\* same parent get the same name.
\*
\* Reachable trace: Create(1,"n1") yields dataset 2. Create(1,"n1")
\* would normally fail; under BuggyAllowDuplicateName it succeeds and
\* dataset 3 also has name="n1" with parent=1 — duplicate sibling name.
SPECIFICATION Spec

CONSTANTS
    MaxDatasets = 3
    Names = {"n1", "n2"}
    MaxTxg = 4
    BuggyAllowCycles = FALSE
    BuggyAllowDuplicateName = TRUE
    BuggyDestroyNonLeaf = FALSE

INVARIANTS
    SiblingNameUnique
