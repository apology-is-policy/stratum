\* Buggy-impl model check: DeviceStampPaddrs=FALSE. Reproduces the
\* R15 F1 P0 nonce-reuse bug at the spec level.
\*
\* Expect: NonceUniqueness VIOLATED at a very shallow depth — two
\* devices both perform their first ReserveAndWrite at gen=1,
\* producing identical (paddr=1, gen=1) nonces for DIFFERENT
\* on-disk plaintexts (different per-device tree content). TLC
\* reports a counterexample.

CONSTANTS
    Devices          = {1, 2, 3}
    MaxCommits       = 3
    MaxPaddrsPerDev  = 3
    DeviceStampPaddrs = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    NonceUniqueness
