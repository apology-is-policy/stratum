\* Buggy demo — SnapshotCreate uses an arbitrary created_txg instead of
\* current_txg + 1. Expected: ChainTxgOrdered violated.
\*
\* Reachable trace: Create snap 1 with created_txg = 1 (normal).
\*   Create snap 2 — under BuggyChainOutOfOrder, the chosen txg may
\*   equal or exceed snap 1's created_txg. If snap 2's created_txg
\*   ≤ snap 1's created_txg, ChainTxgOrdered's strict-decreasing
\*   walk fires.
SPECIFICATION Spec

CONSTANTS
    MaxSnaps = 2
    MaxTxg = 4
    TreeRoots = {"r0", "r1"}
    BuggyDeleteWithHold = FALSE
    BuggyChainOutOfOrder = TRUE
    BuggyExtentTxgUnbounded = FALSE

INVARIANTS
    ChainTxgOrdered
