\* Fixed config — production cb behavior. NReplicas=3 with OK/CORRUPT/FAILED
\* mix; rewrite_can_fail enabled to exercise both branches of the writeback
\* outcome (OK_VERIFIED + FAIL → REPAIRED vs UNREPAIRABLE).
SPECIFICATION Spec

CONSTANTS
    NReplicas = 3
    InitialReplicaStates <- ReplicaStates_OK_CORRUPT_FAILED
    RewriteCanFail = TRUE
    BuggyAcceptCorrupt = FALSE
    BuggyNoVerifyWriteback = FALSE

INVARIANTS
    TypeOK
    NoSilentCorruption
    WriteVerifyMandatory
    ResultSoundness
    LogIntegrity
    NoOriginalOKMeansUnrepairable
    AllInitialOKMeansOK
