\* P9-SLATE-2 buggy: enable BuggyAttachSocketOnly action.
\*
\* BuggyAttachSocketOnly updates the socket field without updating
\* connected. From the disconnected state, this leaves
\* socket = s, connected = FALSE — torn state.
\* ConnectionAtomic ( connected = (socket # NoSocket) ) must fire.
\*
\* Expected verdict: TLC reports a counterexample on ConnectionAtomic
\* almost immediately (BuggyAttachSocketOnly fires once from initial
\* state — socket is set, connected stays FALSE).
SPECIFICATION Spec

CONSTANTS
    EventVals                = {e1}
    MaxEvents                = 1
    Sockets                  = {s1}
    Panels                   = {L, R}
    MaxConfigChanges         = 1
    BuggyReorder             = FALSE
    BuggyVersionDecrement    = FALSE
    BuggyAttachSplitState    = TRUE
    BuggyDisconnectKeepsPath = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
