\* R14 P1 demonstration — non-idempotent retry (buggy impl).
\*
\* This cfg sets IdempotentRetry=FALSE. RetryPhase3 bumps
\* coord_commit_content on each retry, which causes consecutive
\* WriteFinal firings at the same target_gen to stamp DIFFERENT content
\* on different devices. TLC MUST surface a ContentAgreementAtGen
\* violation — that violation IS the P1 bug in the spec space.
\*
\* To run:   java -cp /tmp/tla2tools.jar tlc2.TLC -workers auto -deadlock \
\*                -config quorum_buggy.cfg quorum.tla 2>&1 | tail -40
\* Expected: "Error: Invariant Invariants is violated" and a trace ending
\* with two devices at the same gen holding different contents.
\* MaxRetries = 1 already surfaces ContentQuorumAtGen violation under
\* non-idempotent retry: a single retry bumps coord_commit_content, so
\* WriteFinal firings on different devices during the pre-retry and
\* post-retry phases stamp divergent content at the same target_gen.
CONSTANTS
    Devices         = {1, 2, 3}
    MaxCommits      = 1
    MaxFaults       = 0
    MaxRetries      = 1
    IdempotentRetry = FALSE

SPECIFICATION Spec

INVARIANT Invariants
