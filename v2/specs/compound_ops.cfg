\* P9.5-PARALLEL-2: healthy compound-op + reader composition.
\*
\* Two writers, one reader, two abstract subsystems. MaxOps=2 + MaxSteps=2
\* + MaxReads=2 keeps the state space modest while exercising the
\* canonical race scenarios:
\*   - one writer starts an op, the OTHER writer must wait (big-fs-lock);
\*   - reader observes per-subsystem values from intermediate states;
\*   - reader's observations across both subsystems span possibly
\*     different ops_completed values (the documented eventual-
\*     consistency contract).
\*
\* StepDelta=2 + InitialCounter=4 gives sub_a/sub_b counters the
\* working range {0, 2, 4, 6, 8} — enough to demonstrate the
\* NoNegativeCounters invariant holds in the good cfg (each
\* CompoundOpStep with sign=-1 checks counter[s] >= 2 first).
\*
\* Expected verdict: TLC explores every interleaving of
\* CompoundOpStart / CompoundOpStep / CompoundOpCommit / ReaderRead.
\* No invariants fire. State space estimate: ~50K reachable; full
\* check expected under 60s on a typical workstation.

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Writers                     = {w1, w2}
    Readers                     = {r1}
    SubKeys                     = {a, b}
    MaxOps                      = 2
    MaxStepsPerOp               = 2
    MaxReadsPerReader           = 2
    InitialCounter              = 4
    StepDelta                   = 2
    BuggyReleaseLockMid         = FALSE
    BuggyNegativeCounter        = FALSE

INVARIANTS
    AllInvariants
