\* Buggy config — Lookup terminates on TOMBSTONE (treats it as
\* EMPTY).
\*
\* Repro: Create(n_a) → slot 0; Create(n_b) collides → slot 1;
\* Unlink(n_a) leaves TOMBSTONE at slot 0 (healthy write path).
\* Lookup(n_b) under the bug walks slot 0, sees TOMBSTONE, treats
\* it as EMPTY, returns NotFound — despite (n_b, ino_2, gen) being
\* in the abstract `links` oracle and a live record at slot 1.
\*
\* Expected verdict: LookupAgreesWithLinks fires within a few states.
SPECIFICATION Spec

CONSTANTS
    Dirs                            = {d1}
    Names                           = {"n_a", "n_b", "n_c"}
    Inos                            = {ino_1, ino_2}
    MaxGen                          = 1
    MaxProbe                        = 3
    Hash                            <- HashAB_C
    NONE                            = NONE
    BuggyUnlinkUsesEmpty            = FALSE
    BuggyCreateOverwritesNoProbe    = FALSE
    BuggyLookupStopsOnTombstone     = TRUE

INVARIANTS
    Invariants
