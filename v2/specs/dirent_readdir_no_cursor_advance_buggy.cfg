\* Buggy config — Readdir emits a record but doesn't advance the
\* cursor past the slot.
\*
\* Repro: Create(n_a) → slot 0; ReaddirReset; ReaddirStep at probe 0
\* under the bug appends (probe=0, record) to emit_log but leaves
\* iter[d] at 0. The next ReaddirStep again sees slot 0 (still a
\* record) and re-emits — emit_log now has two entries with the
\* same probe.
\*
\* Expected verdict: ReaddirNoDuplicateProbeInLog (and
\* ReaddirCursorMonotonicEmits) fires within a few states.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = TRUE
    BuggyReaddirSkipsLiveRecord         = FALSE

INVARIANTS
    Invariants
