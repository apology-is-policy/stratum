\* Buggy variant — Remove leaves an EMPTY slot instead of a TOMBSTONE.
\*
\* Repro: Set(n_a) → slot 0; Set(n_b) collides → slot 1.
\* Remove(n_a) under the bug clears slot 0 to EMPTY. Lookup(n_b)
\* short-circuits at the empty slot, returning NONE despite the
\* (n_b, val) being in `pairs`.
\*
\* Expected verdict: LookupAgreesWithPairs fires.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Inos                                = {i1}
    Names                               = {"n_a", "n_b", "n_c"}
    Values                              = {v1, v2}
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = TRUE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE

INVARIANTS
    Invariants
