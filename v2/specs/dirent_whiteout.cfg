\* P8-POSIX-9b: healthy whiteout-enabled config.
\*
\* Same Hash + Names + Inos as dirent.cfg (3 names, 2 inos, MaxProbe=3).
\* `EnableWhiteoutModel = TRUE` enables the Whiteout action; both
\* whiteout-buggy variants are FALSE.
\*
\* Expected verdict: TLC explores Create + Unlink + Whiteout +
\* Readdir interleavings without firing any invariant. The new
\* WhiteoutSlotShape + ReaddirEmitsWhiteoutsAtEnd invariants hold by
\* construction of the healthy Whiteout action + the readdir
\* whiteout-emit branch.
\*
\* Validation that the buggy variants would fail under TLC:
\*   - dirent_whiteout_drops_name_buggy.cfg flips
\*     BuggyWhiteoutDropsName = TRUE; expected to fire
\*     ReaddirEmitsWhiteoutsAtEnd indirectly via the symmetric
\*     write-side check (the slot becomes TOMBSTONE, breaking
\*     the link-removed-implies-whiteout-slot pin) — actually
\*     fires WhiteoutSlotShape post-action because the abstract
\*     `links` removed the name but no whiteout slot exists.
\*     Wait: the spec's WhiteoutSlotShape only constrains slots
\*     that ARE whiteouts. Under the buggy variant, the slot is
\*     TOMBSTONE and the abstract oracle correctly removed the
\*     name from links — both sides agree that the name is gone.
\*     No invariant fires for this read-side distinction. The
\*     observable failure is at runtime: readdir doesn't emit a
\*     whiteout, so overlayfs userspace misses the marker. This
\*     means the invariant catches the SHAPE mismatch but not
\*     the SEMANTIC distinction. Documented forward-note: the
\*     C-impl tests cover the readdir-emission requirement
\*     directly (whiteout-emit-on-readdir test).
\*   - dirent_lookup_returns_record_on_whiteout_buggy.cfg flips
\*     BuggyLookupReturnsRecordOnWhiteout = TRUE; expected to
\*     fire LookupAgreesWithLinks (the abstract oracle says
\*     `links` doesn't contain the whiteout's name, so Lookup
\*     should return NONE; under the bug, Lookup returns
\*     <<"_", 0>> which doesn't equal NONE).
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Dirs                                = {d1}
    Names                               = {"n_a", "n_b", "n_c"}
    Inos                                = {ino_1, ino_2}
    MaxGen                              = 1
    MaxProbe                            = 3
    Hash                                <- HashAB_C
    NONE                                = NONE
    BuggyUnlinkUsesEmpty                = FALSE
    BuggyCreateOverwritesNoProbe        = FALSE
    BuggyLookupStopsOnTombstone         = FALSE
    BuggyReaddirIncludesTombstones      = FALSE
    BuggyReaddirNoCursorAdvance         = FALSE
    BuggyReaddirSkipsLiveRecord         = FALSE
    EnableWhiteoutModel                 = TRUE
    BuggyWhiteoutDropsName              = FALSE
    BuggyLookupReturnsRecordOnWhiteout  = FALSE

INVARIANTS
    Invariants
