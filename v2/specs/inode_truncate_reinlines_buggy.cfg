\* P8-POSIX-5 buggy variant — TruncateExtent reverts to KIND_INLINE.
\*
\* Repro: AllocFresh(i1) → state=ALLOCATED, kind=INLINE, len=0,
\* ever_extent=FALSE. WriteInline(i1, 1) → kind=INLINE, len=1.
\* TransitionToExtent(i1) → kind=EXTENT, len=0, ever_extent=TRUE.
\* TruncateExtent(i1, 0) under the bug → kind=INLINE, len=0, but
\* ever_extent stays TRUE.
\*
\* Expected verdict: TLC fires OneWayInlineToExtent — at the post-
\* truncate state, ever_extent[i1] = TRUE AND data_kind[i1] =
\* KIND_INLINE, violating the implication.
SPECIFICATION Spec

CONSTANTS
    Inos                         = {i1}
    MaxGen                       = 1
    MaxNlink                     = 1
    BuggyReuseNoGenBump          = FALSE
    BuggyDoubleAllocate          = FALSE
    BuggyUnlinkLeavesZeroNlink   = FALSE
    EnableInlineDataModel        = TRUE
    MaxFileLen                   = 3
    MaxInline                    = 1
    BuggyTruncateReinlines       = TRUE
    BuggyInlineWriteSpills       = FALSE
    EnableOrphanModel            = FALSE
    BuggyAllocAnonClaimsLinked   = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
