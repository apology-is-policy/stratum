\* Healthy fixed config — the canonical green run.
\*
\* Three inos, MaxGen=3 enables enough alloc/free cycles to show
\* multiple reuses without state-space explosion. No buggy variants
\* enabled.
\*
\* P8-POSIX-5: EnableInlineDataModel = FALSE — keeps the existing
\* 9.87M-state run within bounds. The inline-specific actions land
\* in `inode_inline.cfg` (with smaller bounds) where the data_kind /
