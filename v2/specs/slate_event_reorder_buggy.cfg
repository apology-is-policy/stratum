\* P9-SLATE-1 buggy: enable Reorder action.
\*
\* Reorder dispatches a non-head pending event (writes[i] for some
\* i > Len(dispatched)+1). This breaks the prefix relation between
\* dispatched events and written events → EventFIFO must fire.
\*
\* Expected verdict: TLC reports a counterexample on EventFIFO within
\* a few steps. (Two events written, then Reorder dispatches the
\* second instead of the first — dispatched[1] != writes[1].)
SPECIFICATION Spec

CONSTANTS
    EventVals                = {e1, e2, e3}
    MaxEvents                = 4
    Sockets                  = {s1}
    Panels                   = {L, R}
    MaxConfigChanges         = 0
    BuggyReorder             = TRUE
    BuggyVersionDecrement    = FALSE
    BuggyAttachSplitState    = FALSE
    BuggyDisconnectKeepsPath = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
