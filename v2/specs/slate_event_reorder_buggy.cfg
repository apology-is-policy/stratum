\* P9-SLATE-1 buggy: enable Reorder action.
\*
\* Reorder mutates events[dispatched_count+2..Len(events)] by dropping
\* a non-head pending event. This breaks the prefix relation between
\* dispatched events and written events → EventFIFO must fire.
\*
\* Expected verdict: TLC reports a counterexample on EventFIFO within
\* a few steps. (Dispatch the first event, then Reorder drops a later
\* pending event — events[dispatched_count+1..] no longer matches the
\* original write order.)
SPECIFICATION Spec

CONSTANTS
    EventVals               = {e1, e2, e3}
    MaxEvents               = 4
    BuggyReorder            = TRUE
    BuggyVersionDecrement   = FALSE

CHECK_DEADLOCK
    FALSE

INVARIANTS
    Invariants
