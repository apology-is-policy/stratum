\* Buggy variant — AbortBatch only restores paths that were NONE in
\* the pre-batch snapshot. In-place REPLACE on pre-existing bindings
\* is NOT undone. Models the R93 P2-1 bug shape directly: the impl's
\* original truncate-from-end rollback worked when num_bindings_before
\* == 0 but missed in-place REPLACE on pre-existing entries. A
\* multi-Tattach sequence with overlapping target paths could leave
\* the connection with SILENTLY-MUTATED bindings even though Tattach
\* reported failure.
\*
\* Real-world failure mode (the actual R93 P2-1 bug): the parser fails
\* mid-batch; rollback truncates from the end of the bindings array;
\* entries that were ns_bindings_set's REPLACE branch (overwrite
\* in-place, no array growth) are not restored.
\*
\* Expected verdict: TLC fires BindingsMatchAuthored when the abort
\* leaves an in-place REPLACE in bindings while authored reverted to
\* the snapshot's prior value. Reproducer: pre-batch bindings[c][p] =
\* a (in authored too); StartBatch with target_map[p] = b ≠ a;
\* ApplyNext applies, bindings[c][p] = b, authored[c][p] = b;
\* AbortBatch with BuggyMultiBindTruncateOnly: snapshot[p] = a ≠ NONE
\* so bindings[c][p] = b (unchanged), authored[c][p] = a (restored).
\* Now bindings[c][p] = b ≠ a = authored[c][p] — fires.
SPECIFICATION Spec

CONSTANTS
    Connections                   = {c1}
    Paths                         = {p_root, p_home}
    Sources                       = {s_default, s_tank, s_archive}
    DefaultSource                 = s_default
    NONE                          = NONE
    NO_BATCH                      = NO_BATCH
    MaxBindsPerConn               = 2
    BuggyGlobalBindings           = FALSE
    BuggyDetachLeaks              = FALSE
    BuggyUnbindCrosstalk          = FALSE
    BuggyLookupCrosstalk          = FALSE
    EnableMultiBind               = TRUE
    BuggyMultiBindNoRollback      = FALSE
    BuggyMultiBindTruncateOnly    = TRUE

INVARIANTS
    Invariants
