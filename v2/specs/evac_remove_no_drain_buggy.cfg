\* Buggy-impl model check: DrainCheckOnRemove = FALSE.
\* Models the pre-R17 P1-2 state: caller invokes stm_pool_remove_device
\* on a data-bearing device (alloc tree non-empty) without evacuating
\* first. The pool-layer primitive does not re-check drain; the
\* transition to REMOVED silently strips every replica that block b
\* had on d.
\*
\* AtomicEvacuation kept TRUE to isolate the drain-check hazard from
\* the release-before-write hazard already covered by evac_buggy.cfg.
\*
\* Expect: EvacuationAtomic VIOLATED at State 2 (one step from Init):
\* RemoveDirectly(d1) sets device_state[d1]=REMOVED while replicas[b]
\* still contains d1. LiveDevices = {2, 3}, replicas[b] ∩ LiveDevices
\* = {2}, cardinality 1 < MirrorN = 2. Full complete-state-graph
\* search depth is ~4.

CONSTANTS
    AllDevices           = {1, 2, 3}
    Blocks               = {1, 2}
    MirrorN              = 2
    AtomicEvacuation     = TRUE
    DrainCheckOnRemove   = FALSE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    EvacuationAtomic
    AtMostOneEvacuating
    RedundancyPreservedDuringEvacuation
    NoTargetReplicasAfterComplete
