\* P9-9P-0: healthy fid-lifecycle config — the canonical green run.
\*
\* Two connections, two fid slots per connection, two inodes
\* (root + one reusable). MaxGen=2 admits one alloc + one Free
\* + one Reuse cycle on the non-root ino, exercising the gen-bump
\* mechanism that makes stale-fid detection observable.
\*
\* Expected verdict: TLC explores all interleavings of Attach /
\* Walk / IOSuccess / IOReject / Clunk / Detach / Free / ReuseAlloc
\* across the two connections, two fids, two inos. No invariants
\* fire. The healthy IOSuccess is gated on cached_gen = current_gen
\* /\ alive, so it can never produce an observed_ok=TRUE record
\* with mismatching values; healthy Walk snapshots current_gen
\* atomically; healthy Clunk + Detach clear bindings.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE

CONSTANTS
    Connections                   = {c1, c2}
    Fids                          = {f1, f2}
    Inos                          = {i_root, i_other}
    RootIno                       = i_root
    MaxGen                        = 2
    NONE                          = NONE
    BuggyIOSkipsGenCheck          = FALSE
    BuggyWalkSnapshotsStaleGen    = FALSE
    BuggyClunkLeaksFid            = FALSE
    BuggyDetachLeaksFids          = FALSE
    BuggyIORejectFalseAlarms      = FALSE

INVARIANTS
    Invariants
