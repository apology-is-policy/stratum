\* Richer-exploration config: larger AllDevices universe + higher
\* MaxGen to exercise longer add/remove/fail/rejoin sequences.
\* Addresses R16 F7 (spec depth). Complements the base cfg.

CONSTANTS
    AllDevices              = {1, 2, 3, 4, 5, 6}
    MirrorN                 = 2
    MaxGen                  = 6
    RequireRedundancyCheck  = TRUE

INIT Init
NEXT Next

INVARIANTS
    TypeOK
    RedundancyPreservedOnRemove
    AddDeviceIdempotent
    ReconcileRestoresState
    NoOrphanOnRemove
